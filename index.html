<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>繩索受力分析系統 v2 — NFPA 1983 / UIAA</title>
<meta name="description" content="專業繩索救援、攀岩與高空作業的互動式力學計算工具，依 NFPA 1983 / UIAA 101 標準設計" />
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { background: #020617; }
  @keyframes pulseRed { 0%,100%{filter:drop-shadow(0 0 0 rgba(239,68,68,0));} 50%{filter:drop-shadow(0 0 12px rgba(239,68,68,0.9));} }
  .pulse-red { animation: pulseRed 1.2s ease-in-out infinite; }
  @keyframes ropeStretch { 0%{transform:scaleY(1);} 50%{transform:scaleY(1.15);} 100%{transform:scaleY(1);} }
  .rope-stretch { transform-origin: top; animation: ropeStretch 0.6s ease-out; }
  @keyframes flashImpact { 0%{opacity:0;} 30%{opacity:1;} 100%{opacity:0;} }
  .flash-impact { animation: flashImpact 0.5s ease-out; }
  @keyframes countUp { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
  .count-up { animation: countUp 0.25s ease-out; }
  input[type=range]:focus { outline: 2px solid #60a5fa; outline-offset: 2px; }
  @media print {
    body { background: white !important; color: black !important; }
    nav, .no-print { display: none !important; }
    .print-show { display: block !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ========================================================================
// 常數：NFPA 1983 / UIAA / 單位換算
// ========================================================================
const G = 9.80665;                 // m/s²
const KGF_PER_KN = 1000 / G;       // 1 kN ≈ 101.97 kgf
const LBF_PER_KN = 224.809;

// NFPA 1983 (2017 ed.) 繩索與系統強度
const NFPA = {
  G_RATED: { name: 'G (General Use)', mbs_kN: 40, swl_kN: 40 / 15, ratio: 15, persons: 2, color: '#22c55e' },
  T_RATED: { name: 'T (Technical Use)', mbs_kN: 20, swl_kN: 20 / 10, ratio: 10, persons: 1, color: '#3b82f6' },
  E_RATED: { name: 'E (Escape)', mbs_kN: 13.5, swl_kN: 13.5 / 10, ratio: 10, persons: 1, color: '#a855f7' },
};

// 人體承受門檻 (kN) — UIAA / OSHA / ANSI Z359
const HUMAN_THRESHOLDS = [
  { max: 4,  label: '安全範圍',         color: 'text-green-400',   bg: 'bg-green-500/10' },
  { max: 6,  label: 'UIAA 安全帶上限',  color: 'text-yellow-400',  bg: 'bg-yellow-500/10' },
  { max: 8,  label: 'OSHA PFAS 上限',   color: 'text-orange-400',  bg: 'bg-orange-500/10' },
  { max: 12, label: '嚴重內傷風險',     color: 'text-red-400',     bg: 'bg-red-500/10' },
  { max: Infinity, label: '可能致命 / 超 NFPA G MBS', color: 'text-red-500 font-bold', bg: 'bg-red-600/20' },
];

const evalHuman = (kN) => HUMAN_THRESHOLDS.find(t => kN <= t.max);

// 評估安全係數
const evalNfpa = (force_kN, rating) => {
  const r = NFPA[rating];
  const sf = r.mbs_kN / force_kN;
  let level = 'pass', text = `安全係數 ${sf.toFixed(1)}:1 (≥ ${r.ratio}:1)`, color = 'text-green-400';
  if (sf < r.ratio && sf >= r.ratio * 0.6) { level = 'warn'; text = `⚠ 安全係數 ${sf.toFixed(1)}:1 (低於 ${r.ratio}:1)`; color = 'text-yellow-400'; }
  if (sf < r.ratio * 0.6 && sf >= 1) { level = 'fail'; text = `❌ 安全係數 ${sf.toFixed(1)}:1 (嚴重不足)`; color = 'text-orange-400'; }
  if (sf < 1) { level = 'crit'; text = `☠ 超過 MBS ${r.mbs_kN}kN`; color = 'text-red-500 font-bold'; }
  return { sf, level, text, color };
};

// ========================================================================
// 工具函式
// ========================================================================
const toRad = (d) => (d * Math.PI) / 180;
const toDeg = (r) => (r * 180) / Math.PI;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const kNtoKgf = (kN) => kN * KGF_PER_KN;
const fmt = (v, d=1) => Number(v).toFixed(d);

// ========================================================================
// 圖示 (內嵌 SVG，不依賴 lucide)
// ========================================================================
const Icon = ({ name, size=18, className='' }) => {
  const paths = {
    activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
    triangle: <path d="M12 2L2 22h20L12 2z" />,
    arrowDown: <><circle cx="12" cy="12" r="10"/><polyline points="8 12 12 16 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></>,
    git: <><circle cx="12" cy="12" r="3"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></>,
    move: <><polyline points="19 12 12 19 5 12"/><line x1="12" y1="5" x2="12" y2="19"/></>,
    anchor: <><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></>,
    cog: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    print: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
    info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      {paths[name]}
    </svg>
  );
};

// ========================================================================
// 共用 UI
// ========================================================================
const Slider = ({ label, value, min, max, step, onChange, unit, hint, ariaLabel }) => (
  <div className="space-y-2">
    <div className="flex justify-between items-center">
      <label className="text-sm font-medium text-slate-300">{label}</label>
      <span className="text-blue-400 font-mono bg-slate-950 px-2 py-1 rounded text-sm count-up" key={value}>
        {value} {unit}
      </span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value}
      onChange={(e) => onChange(parseFloat(e.target.value))}
      aria-label={ariaLabel || label}
      aria-valuetext={`${value} ${unit}`}
      className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500" />
    {hint && <p className="text-xs text-slate-500">{hint}</p>}
  </div>
);

// 雙單位顯示卡：kN 為主、kgf 為副
const ForceCard = ({ title, kN, colorClass = 'text-white', description, accent }) => (
  <div className={`bg-slate-950 p-4 rounded-xl border ${accent ? 'border-red-900/60' : 'border-slate-800'} flex flex-col items-center justify-center text-center relative overflow-hidden`}>
    <div className="text-slate-400 text-xs mb-1 uppercase tracking-wider">{title}</div>
    <div className={`text-3xl md:text-4xl font-bold font-mono count-up ${colorClass}`} key={kN.toFixed(2)}>
      {fmt(kN, 2)} <span className="text-base text-slate-500 font-sans">kN</span>
    </div>
    <div className="text-sm text-slate-400 font-mono mt-1">≈ {fmt(kNtoKgf(kN), 0)} kgf</div>
    {description && <div className="text-xs text-slate-500 mt-2">{description}</div>}
  </div>
);

const NumberCard = ({ title, value, unit, colorClass = 'text-white', description }) => (
  <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex flex-col items-center justify-center text-center">
    <div className="text-slate-400 text-xs mb-1 uppercase tracking-wider">{title}</div>
    <div className={`text-3xl md:text-4xl font-bold font-mono count-up ${colorClass}`} key={value}>
      {value} <span className="text-base text-slate-500 font-sans">{unit}</span>
    </div>
    {description && <div className="text-xs text-slate-500 mt-2">{description}</div>}
  </div>
);

// NFPA 安全係數徽章
const NfpaBadge = ({ force_kN }) => {
  const [rating, setRating] = useState('G_RATED');
  const r = NFPA[rating];
  const e = evalNfpa(force_kN, rating);
  return (
    <div className="bg-slate-800/40 border border-slate-700 rounded-xl p-4 space-y-3">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <span className="text-xs uppercase tracking-wider text-slate-400">NFPA 1983 安全驗算</span>
        <div className="flex gap-1 text-xs">
          {Object.keys(NFPA).map(k => (
            <button key={k}
              onClick={() => setRating(k)}
              className={`px-2 py-1 rounded font-medium transition-colors ${rating===k ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
              {k.split('_')[0]}
            </button>
          ))}
        </div>
      </div>
      <div className="text-xs text-slate-400">
        <span className="font-medium text-slate-200">{r.name}</span> · MBS {r.mbs_kN} kN · 設計係數 {r.ratio}:1 · {r.persons} 人載重
      </div>
      <div className={`text-sm font-mono ${e.color}`}>{e.text}</div>
      <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
        <div className="h-full transition-all" style={{
          width: `${Math.min(100, (force_kN / r.mbs_kN) * 100)}%`,
          background: e.level==='pass' ? '#22c55e' : e.level==='warn' ? '#eab308' : e.level==='fail' ? '#f97316' : '#ef4444',
        }} />
      </div>
      <div className="flex justify-between text-[10px] text-slate-500 font-mono">
        <span>0 kN</span>
        <span>SWL {fmt(r.swl_kN,1)} kN</span>
        <span>MBS {r.mbs_kN} kN</span>
      </div>
    </div>
  );
};

// ========================================================================
// 模組 1：Capstan 摩擦力 — 加上螺旋繪製、張力熱力圖
// ========================================================================
function FrictionModule() {
  const [load_kgf, setLoad] = useState(100);                  // 載重 kgf
  const [turns, setTurns] = useState(1);
  const [mu, setMu] = useState(0.2);

  const load_kN = (load_kgf * G) / 1000;
  const theta = turns * 2 * Math.PI;
  const gain = Math.exp(mu * theta);
  const hold_kN = load_kN / gain;
  const friction_kN = load_kN - hold_kN;

  // 螺旋繞線 path
  const spiralPath = useMemo(() => {
    const cx = 100, cy = 100, r0 = 40, dr = 4;
    const totalAngle = theta;
    const steps = Math.max(40, Math.ceil(totalAngle * 8));
    let d = '';
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const a = Math.PI / 2 + t * totalAngle;
      const r = r0 + t * dr * Math.min(1, turns);
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
    }
    return d;
  }, [theta, turns]);

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">1. 繩索摩擦力 — Capstan Equation</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            繩索纏繞於圓柱（鉤環、樹幹、下降器）時，摩擦力以指數成長。
            公式：<code className="text-blue-300 bg-slate-800 px-1 rounded">T₁ = T₂ × e^(μθ)</code>
          </p>
        </div>
        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="載重 (T₁)" value={load_kgf} min={10} max={500} step={10} unit="kgf" onChange={setLoad} />
          <Slider label="纏繞圈數 (θ)" value={turns} min={0} max={4} step={0.25} unit="圈" onChange={setTurns} />
          <Slider label="摩擦係數 (μ)" value={mu} min={0.1} max={0.8} step={0.05} unit="" onChange={setMu}
            hint="0.2 金屬鉤環/確保器 · 0.4 乾燥樹幹 · 0.6 粗糙岩石" />
        </div>
      </div>

      <div className="space-y-4 flex flex-col">
        <div className="grid grid-cols-2 gap-4">
          <ForceCard title="所需制動力 (T₂)" kN={hold_kN} colorClass="text-green-400" description="您需要施加的力" />
          <ForceCard title="摩擦力 (T₁−T₂)" kN={friction_kN} colorClass="text-blue-400" description="圓柱吸收的力" />
        </div>
        <NumberCard title="放大倍數" value={fmt(gain, 1)} unit="倍" colorClass="text-purple-400"
          description={turns === 0 ? '未纏繞' : `${turns} 圈 × μ=${mu}`} />

        <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-center p-4 min-h-[220px]">
          <svg viewBox="0 0 200 220" className="w-full h-full max-h-64">
            <circle cx="100" cy="100" r="40" fill="#334155" stroke="#475569" strokeWidth="3" />
            <text x="100" y="104" fill="#94a3b8" fontSize="10" textAnchor="middle">μ = {mu}</text>

            <path d={spiralPath} fill="none" stroke="#f59e0b" strokeWidth="3" strokeLinecap="round" />

            <line x1="60" y1="140" x2="60" y2="200" stroke="#ef4444" strokeWidth="5" />
            <polygon points="55,200 65,200 60,210" fill="#ef4444" />
            <text x="60" y="218" fill="#ef4444" fontSize="11" fontWeight="bold" textAnchor="middle">T₁ {load_kgf} kgf</text>

            <line x1="140" y1="100" x2="140" y2="20" stroke="#22c55e" strokeWidth={Math.max(1.5, 5 - turns)} />
            <polygon points="135,30 145,30 140,18" fill="#22c55e" />
            <text x="140" y="14" fill="#22c55e" fontSize="11" fontWeight="bold" textAnchor="middle">T₂ {fmt(kNtoKgf(hold_kN),0)} kgf</text>
          </svg>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 2：Highline 索道張力 — 加 NFPA 安全係數
// ========================================================================
function HighlineModule() {
  const [load_kgf, setLoad] = useState(100);
  const [angle, setAngle] = useState(10);

  const load_kN = (load_kgf * G) / 1000;
  const tension_kN = load_kN / (2 * Math.sin(toRad(angle)));
  const multiplier = tension_kN / load_kN;
  const internalAngle = 180 - 2 * angle;

  const human = evalHuman(tension_kN);
  const lowAngle = angle < 5;

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">2. 索道繩固定點張力 — Highline</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            兩點間水平架繩，下垂角越小（中央夾角越大），固定點張力呈倍數放大。
            公式：<code className="text-blue-300 bg-slate-800 px-1 rounded">T = W / (2sinθ)</code>
            <br/><span className="text-yellow-400">救援實務：θ &lt; 5° 即視為高風險（10% 規則）</span>
          </p>
        </div>
        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="中央載重 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
          <Slider label="下垂角 (θ)" value={angle} min={1} max={45} step={1} unit="°" onChange={setAngle} />
        </div>
        {lowAngle && (
          <div className="bg-red-950/40 border border-red-800 rounded-xl p-3 text-sm text-red-300">
            ⚠ 下垂角過小，固定點張力急遽放大，違反救援 10% 規則
          </div>
        )}
      </div>

      <div className="space-y-4 flex flex-col">
        <div className="grid grid-cols-3 gap-3">
          <NumberCard title="中央夾角" value={fmt(internalAngle,0)} unit="°" colorClass="text-purple-400" />
          <ForceCard title="單側張力 T" kN={tension_kN} colorClass={human.color} />
          <NumberCard title="放大倍數" value={fmt(multiplier,1)} unit="倍" colorClass="text-blue-400" />
        </div>
        <NfpaBadge force_kN={tension_kN} />

        <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-center p-4 min-h-[180px]">
          <svg viewBox="0 0 300 160" className="w-full h-full">
            <rect x="10" y="20" width="10" height="50" fill="#64748b" />
            <rect x="280" y="20" width="10" height="50" fill="#64748b" />
            {(() => {
              const sag = 130 * Math.tan(toRad(angle));
              const midY = 40 + sag;
              return (<>
                <path d={`M 20 40 L 150 ${midY} L 280 40`} fill="none" stroke="#f59e0b" strokeWidth="3" />
                <circle cx="150" cy={midY} r="8" fill="#ef4444" />
                <line x1="150" y1={midY} x2="150" y2={midY + 30} stroke="#ef4444" strokeWidth="2" strokeDasharray="4" />
                <text x="155" y={midY + 25} fill="#ef4444" fontSize="11" fontWeight="bold">W = {load_kgf} kgf</text>
                <path d={`M 50 40 A 30 30 0 0 1 ${50 + 30 * Math.cos(toRad(angle))} ${40 + 30 * Math.sin(toRad(angle))}`} fill="none" stroke="#94a3b8" />
                <text x="55" y="55" fill="#94a3b8" fontSize="11">θ={angle}°</text>
                <line x1="20" y1="40" x2="80" y2="40" stroke="#475569" strokeDasharray="2" />
                <text x="155" y={midY - 12} fill="#c084fc" fontSize="11">∠{fmt(internalAngle,0)}°</text>
              </>);
            })()}
          </svg>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 3：墜落衝擊力 — 修 useEffect bug、加繩拉伸動畫、人體分級警告
// ========================================================================
function FallImpactModule() {
  const [mass, setMass] = useState(80);
  const [ropeLength, setRopeLength] = useState(10);
  const [fallDistance, setFallDistance] = useState(5);
  const [k_kN, setK] = useState(40);             // 繩索動態剛度

  // FIX: 只依 ropeLength，使用 Math.min
  useEffect(() => {
    setFallDistance(prev => Math.min(prev, ropeLength * 2));
  }, [ropeLength]);

  const fallFactor = fallDistance / ropeLength;
  const mg_kN = (mass * G) / 1000;
  const impact_kN = mg_kN + Math.sqrt(mg_kN * mg_kN + 2 * k_kN * mg_kN * fallFactor);
  const human = evalHuman(impact_kN);

  // 觸發動畫的 key
  const [animKey, setAnimKey] = useState(0);
  const [showFlash, setShowFlash] = useState(false);
  useEffect(() => {
    setAnimKey(k => k + 1);
    setShowFlash(true);
    const t = setTimeout(() => setShowFlash(false), 500);
    return () => clearTimeout(t);
  }, [fallFactor, mass, k_kN]);

  // 視覺定位
  const startY = fallFactor <= 1 ? 60 : 60 - (fallFactor - 1) * 30;
  const targetY = fallFactor <= 1 ? 100 + fallFactor * 50 : 150 + (fallFactor - 1) * 30;

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">3. 墜落衝擊力 — UIAA Fall Factor</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            墜落係數 FF = 墜落距離 / 有效繩長。最大 FF=2（先鋒墜落）。
            公式：<code className="text-blue-300 bg-slate-800 px-1 rounded">F = mg + √(mg² + 2·k·mg·FF)</code>
          </p>
          <p className="text-xs text-slate-500 mt-2">
            人體門檻：&lt;4 安全 · &lt;6 UIAA 上限 · &lt;8 OSHA · &lt;12 重傷 · ≥12 致命
          </p>
        </div>
        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="體重 (m)" value={mass} min={50} max={120} step={1} unit="kg" onChange={setMass} />
          <Slider label="有效繩長 (L)" value={ropeLength} min={1} max={50} step={1} unit="m" onChange={setRopeLength} />
          <Slider label="墜落距離 (h)" value={fallDistance} min={0.1} max={ropeLength * 2} step={0.1} unit="m" onChange={setFallDistance} />
          <Slider label="繩索動態剛度 k" value={k_kN} min={20} max={100} step={5} unit="kN" onChange={setK}

        </div>
      </div>

        <div className="grid grid-cols-2 gap-4">
          <NumberCard title="墜落係數 FF" value={fmt(fallFactor,2)} unit=""
            colorClass={fallFactor>=2 ? 'text-red-500 font-bold' : fallFactor>1 ? 'text-orange-400' : fallFactor>0.5 ? 'text-yellow-400' : 'text-green-400'} />
          <ForceCard title="衝擊力" kN={impact_kN}
            colorClass={human.color + (impact_kN > 6 ? ' pulse-red' : '')}

        <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-center p-4 relative overflow-hidden min-h-[260px]">

            <div className="absolute inset-0 bg-red-500/30 flash-impact pointer-events-none" />
          )}
          <svg viewBox="0 0 200 280" className="w-full h-full max-h-64">
            <circle cx="100" cy="50" r="6" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" />
            <text x="110" y="55" fill="#94a3b8" fontSize="10">固定點</text>

            {/* 繩索：FF≤1 直墜，FF&gt;1 上方有起跌段 */}
            {fallFactor <= 1 ? (
              <line key={`r-${animKey}`} x1="100" y1="50" x2="100" y2={targetY}
                stroke="#f59e0b" strokeWidth="2.5">
                <animate attributeName="y2" from={startY} to={targetY} dur="0.5s" fill="freeze" />
                <animate attributeName="strokeWidth" values="2.5;4;2.5" dur="0.4s" begin="0.5s" />
              </line>
            ) : (
              <>
                <line x1="100" y1="50" x2="100" y2="20" stroke="#f59e0b" strokeWidth="2" strokeDasharray="3" />
                <text x="105" y="18" fill="#94a3b8" fontSize="10">起跌點</text>
                <path key={`r-${animKey}`} d={`M 100 50 Q 130 80 130 ${targetY}`}
                  fill="none" stroke="#f59e0b" strokeWidth="2.5">
                  <animate attributeName="d"
                    from={`M 100 50 Q 130 80 130 ${startY}`}
                    to={`M 100 50 Q 130 80 130 ${targetY}`}
                    dur="0.5s" fill="freeze" />
                </path>
              </>
            )}

            <circle key={`c-${animKey}`}
              cx={fallFactor <= 1 ? 100 : 130} cy={targetY} r="9"
              fill={impact_kN > 8 ? '#ef4444' : impact_kN > 6 ? '#f97316' : impact_kN > 4 ? '#eab308' : '#22c55e'}>
              <animate attributeName="cy"
                values={`${startY}; ${targetY+8}; ${targetY-2}; ${targetY}`}
                keyTimes="0; 0.7; 0.85; 1" dur="0.7s"
                calcMode="spline"
                keySplines="0.42 0 1 1; 0 0 0.58 1; 0 0 0.58 1"
                fill="freeze" />
            </circle>

            <text x="100" y="270" fill="#64748b" fontSize="9" textAnchor="middle">動態模擬：繩索拉伸 → 反彈</text>
          </svg>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 4：死亡三角 — 加力向量分解動畫
// ========================================================================
function DeathTriangleModule() {
  const [load_kgf, setLoad] = useState(100);
  const [angle, setAngle] = useState(60);

  const load_kN = (load_kgf * G) / 1000;
  const t = toRad(angle);
  // 標準 V 型：每邊 W / (2 cos(θ/2))
  const vRig_kN = load_kN / (2 * Math.cos(t / 2));
  // 死亡三角（封閉）：每邊承受向下分量 + 水平擠壓分量
  // 向量推導：每側張力 = sqrt( (W/(2cos))² + (W·sin/(2cos))² ... ) — 採用較教學版公式
  const dt_kN = load_kN * Math.sqrt(1 + Math.pow(Math.tan(t / 2), 2)) / (2 * Math.cos(t / 2));

  // SVG 動態
  const dy = 70;
  const dx = dy * Math.tan(t / 2);
  const midX = 150;
  const aL = midX - dx, aR = midX + dx;
  const minX = Math.min(0, aL - 30);
  const maxX = Math.max(300, aR + 30);
  const vBoxW = maxX - minX;

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">4. 死亡三角 — Death Triangle</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            扁帶連接兩個固定點且<strong className="text-red-400">未打結（封閉三角）</strong>時，
            水平方向的擠壓分量會大幅放大固定點負載。安全做法：使用流動分力環或打孤狼結。
          </p>
        </div>
        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="載重 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
          <Slider label="夾角 (θ)" value={angle} min={10} max={160} step={5} unit="°" onChange={setAngle} />
        </div>
      </div>

      <div className="space-y-4 flex flex-col">
        <div className="grid grid-cols-2 gap-4">
          <ForceCard title="V 型 (單點張力)" kN={vRig_kN}
            colorClass={vRig_kN > load_kN ? 'text-yellow-400' : 'text-green-400'}
            description={`${fmt((vRig_kN/load_kN)*100,0)}% 載重`} />
          <ForceCard title="死亡三角 (合力)" kN={dt_kN} colorClass="text-red-500"
            description={`${fmt((dt_kN/load_kN)*100,0)}% 載重`} accent />
        </div>
        <NfpaBadge force_kN={dt_kN} />

        <div className="flex-1 grid grid-cols-2 gap-2">
          <div className="bg-slate-950 rounded-xl border border-slate-800 flex flex-col items-center p-3 overflow-hidden">
            <span className="text-xs text-green-400 mb-1 font-bold">✓ 標準 V 型架設</span>
            <svg viewBox={`${minX} 0 ${vBoxW} 170`} className="w-full h-full">
              <circle cx={aL} cy="40" r="4" fill="#cbd5e1" />
              <circle cx={aR} cy="40" r="4" fill="#cbd5e1" />
              <path d={`M ${aL} 40 L ${midX} 110 L ${aR} 40`} fill="none" stroke="#22c55e" strokeWidth="2.5" />
              <circle cx={midX} cy="110" r="6" fill="#3b82f6" />
              <line x1={midX} y1="110" x2={midX} y2="150" stroke="#ef4444" strokeWidth="3" />
              <text x={midX+8} y="148" fill="#ef4444" fontSize="11">{load_kgf}kgf</text>
              {/* 力箭頭沿繩索方向 */}
              <line x1={aL} y1="40" x2={aL - 18} y2="22" stroke="#22c55e" strokeWidth="2" />
              <text x={aL - 50} y="18" fill="#22c55e" fontSize="11" fontWeight="bold">{fmt(kNtoKgf(vRig_kN),0)}</text>
              <line x1={aR} y1="40" x2={aR + 18} y2="22" stroke="#22c55e" strokeWidth="2" />
              <text x={aR + 22} y="18" fill="#22c55e" fontSize="11" fontWeight="bold">{fmt(kNtoKgf(vRig_kN),0)}</text>
            </svg>
          </div>

          <div className="bg-slate-950 rounded-xl border border-red-900/50 flex flex-col items-center p-3 relative overflow-hidden">
            <span className="text-xs text-red-400 mb-1 font-bold">✗ 危險：死亡三角</span>
            <svg viewBox={`${minX} 0 ${vBoxW} 170`} className="w-full h-full">
              <circle cx={aL} cy="40" r="4" fill="#cbd5e1" />
              <circle cx={aR} cy="40" r="4" fill="#cbd5e1" />
              <path d={`M ${aL} 40 L ${aR} 40 L ${midX} 110 Z`} fill="rgba(239,68,68,0.08)" stroke="#ef4444" strokeWidth="2.5" />
              <circle cx={midX} cy="110" r="6" fill="#3b82f6" />
              <line x1={midX} y1="110" x2={midX} y2="150" stroke="#ef4444" strokeWidth="3" />
              {/* 向內擠壓的水平箭頭 */}
              <line x1={aL} y1="40" x2={aL + 25} y2="40" stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrL)" />
              <line x1={aR} y1="40" x2={aR - 25} y2="40" stroke="#ef4444" strokeWidth="2" markerEnd="url(#arrR)" />
              <defs>
                <marker id="arrL" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#ef4444" /></marker>
                <marker id="arrR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#ef4444" /></marker>
              </defs>
              <text x={aL - 50} y="35" fill="#ef4444" fontSize="11" fontWeight="bold">{fmt(kNtoKgf(dt_kN),0)}</text>
              <text x={aR + 22} y="35" fill="#ef4444" fontSize="11" fontWeight="bold">{fmt(kNtoKgf(dt_kN),0)}</text>
            </svg>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 5：變向固定點

    <div className="grid md:grid-cols-2 gap-8">

          <h2 className="text-2xl font-bold text-slate-100 mb-2">5. 變向固定點 / 滑輪</h2>

                </text>
                {angle > 0 && (
                  <path d={`M ${100 - 30 * Math.sin(a)} ${100 + 30 * Math.cos(a)} A 30 30 0 0 0 ${100 + 30 * Math.sin(a)} ${100 + 30 * Math.cos(a)}`}

// ========================================================================
// 模組 6：固定點與拉力夾角模擬器（保留拖曳，加無障礙與磁吸）
// ========================================================================
function capstanGain(mu, theta) { return Math.exp(mu * theta); }

function AnchorPullAngleModule() {
  // 畫布尺寸固定，不可調整
  const W = 780, H = 520;
  const massKg = 100;
  const T_L = (massKg * G) / 1000;

  // A（固定點）與 L（負載）位置鎖定 — 重力方向永遠向下
  const A = { x: W * 0.5, y: H * 0.30 };
  const L = { x: W * 0.5, y: H * 0.82 };   // L 永遠在 A 正下方
  const R_PULL = 200;                       // P 在以 A 為圓心、固定半徑的圓上移動

  // 拉力角度 α：從 A→L（向下）量起；正值 = P 在右側，負值 = P 在左側
  const [alphaDeg, setAlphaDeg] = useState(90);    // 預設 90°：P 水平向右
  const [mu, setMu] = useState(0.20);
  const [tight, setTight] = useState('P');
  const [dragging, setDragging] = useState(false);

  // P 由 α 推算（單位向量旋轉：A→L 為 (0,+1)，順時針旋轉 α 度）
  const alphaRad = toRad(alphaDeg);
  const P = {
    x: A.x + R_PULL * Math.sin(alphaRad),
    y: A.y + R_PULL * Math.cos(alphaRad),
  };

  // 拖曳 P：以滑鼠相對 A 的位置反推 α（限制 -180~180）
  const onMove = useCallback((e) => {
    if (!dragging) return;
    const rect = e.currentTarget.getBoundingClientRect();
    // 將像素座標還原到 viewBox 座標
    const sx = (e.clientX - rect.left) * (W / rect.width);
    const sy = (e.clientY - rect.top) * (H / rect.height);
    const dx = sx - A.x;
    const dy = sy - A.y;
    // 從 +y（向下）方向量起的順時針角度
    let ang = toDeg(Math.atan2(dx, dy));
    if (ang > 180) ang -= 360;
    if (ang < -180) ang += 360;
    setAlphaDeg(ang);
  }, [dragging]);

  // 力學計算
  const data = useMemo(() => {
    const absAlpha = Math.abs(alphaDeg);
    const theta = toRad(absAlpha);
    const gain = capstanGain(mu, theta);
    const T_P = tight === 'P' ? T_L * gain : T_L / gain;

    // 兩端張力沿 A→L、A→P 拉動 A 端
    const uAL = { x: 0, y: 1 };
    const uAP = { x: Math.sin(alphaRad), y: Math.cos(alphaRad) };
    const Rx = T_L * uAL.x + T_P * uAP.x;
    const Ry = T_L * uAL.y + T_P * uAP.y;
    const Rmag = Math.hypot(Rx, Ry);
    return { absAlpha, gain, T_P, Rmag, Rx, Ry };
  }, [alphaDeg, mu, tight, T_L, alphaRad]);

  // 固定常用角度按鈕
  const presetAngles = [0, 30, 45, 60, 90, 120, 150, 180];

  return (
    <div className="bg-slate-50 text-slate-900 rounded-xl overflow-hidden shadow-inner">
      <div className="p-4 md:p-6">
        <h2 className="text-2xl font-bold text-slate-800 mb-2">6. 固定點與拉力夾角模擬器</h2>
        <p className="text-slate-500 text-sm mb-4">
          負載 <b>L</b> 永遠在固定點 <b>A</b> 正下方（重力方向）。<b>拖曳藍色拉力點 P</b> 改變夾角 α，或用下方滑桿調整。
        </p>

        <div className="mb-4 grid grid-cols-2 md:grid-cols-4 gap-3">
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-1">摩擦係數 μ</div>
            <input type="range" min="0" max="0.6" step="0.01" value={mu}
              onChange={(e) => setMu(parseFloat(e.target.value))} className="w-full accent-blue-500"
              aria-label="摩擦係數" />
            <div className="text-sm font-mono">μ = {mu.toFixed(2)}</div>
          </div>
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-1">夾角 α</div>
            <input type="range" min="-180" max="180" step="1" value={alphaDeg}
              onChange={(e) => setAlphaDeg(parseFloat(e.target.value))} className="w-full accent-orange-500"
              aria-label="夾角" />
            <div className="text-lg font-mono text-orange-600">{data.absAlpha.toFixed(1)}°
              <span className="text-xs text-slate-400 ml-1">{alphaDeg >= 0 ? '右' : '左'}</span>
            </div>
          </div>
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-1">合力 R（A 端承受）</div>
            <div className="text-lg font-mono text-red-600">{fmt(data.Rmag, 2)} kN</div>
            <div className="text-xs text-slate-500">≈ {fmt(kNtoKgf(data.Rmag), 0)} kgf</div>
          </div>
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-2">緊邊 (Capstan)</div>
            <div className="flex gap-1">
              <button onClick={() => setTight('P')}
                className={`flex-1 px-2 py-1 rounded text-xs font-medium ${tight==='P' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>P 緊邊</button>
              <button onClick={() => setTight('L')}
                className={`flex-1 px-2 py-1 rounded text-xs font-medium ${tight==='L' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>L 緊邊</button>
            </div>
            <div className="text-[10px] text-slate-500 mt-1">e^μθ 增益 = {fmt(data.gain,2)}</div>
          </div>
        </div>

        {/* 預設角度快捷鈕 */}
        <div className="mb-3 flex flex-wrap gap-1.5">
          <span className="text-xs text-slate-500 self-center mr-1">快速角度：</span>
          {presetAngles.map(a => (
            <button key={a} onClick={() => setAlphaDeg(alphaDeg < 0 ? -a : a)}
              className={`px-2 py-1 text-xs rounded ${data.absAlpha === a ? 'bg-orange-500 text-white' : 'bg-white border border-slate-300 hover:bg-slate-100'}`}>
              {a}°
            </button>
          ))}
          <button onClick={() => setAlphaDeg(-alphaDeg)}
            className="px-2 py-1 text-xs rounded bg-slate-100 border border-slate-300 hover:bg-slate-200">↔ 鏡像</button>
        </div>

        {/* 畫布：尺寸固定 */}
        <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
          <svg viewBox={`0 0 ${W} ${H}`}
            className="w-full select-none touch-none bg-white"
            style={{ aspectRatio: `${W} / ${H}` }}
            onPointerMove={onMove}
            onPointerUp={() => setDragging(false)}
            onPointerLeave={() => setDragging(false)}>

            {/* 格線 */}
            {[...Array(Math.ceil(W/40)+1)].map((_,i)=><line key={`v${i}`} x1={i*40} y1={0} x2={i*40} y2={H} stroke="#f1f5f9" />)}
            {[...Array(Math.ceil(H/40)+1)].map((_,i)=><line key={`h${i}`} x1={0} y1={i*40} x2={W} y2={i*40} stroke="#f1f5f9" />)}

            {/* 重力參考線（A 正下方虛線） */}
            <line x1={A.x} y1={A.y} x2={A.x} y2={H} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4 6" />
            <text x={A.x + 8} y={A.y + 80} fontSize="11" fill="#94a3b8">重力方向 ↓</text>

            {/* P 可拖曳的軌跡圓 */}
            <circle cx={A.x} cy={A.y} r={R_PULL} fill="none" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="2 4" />

            {/* 角度弧（弧線本身在底層） */}
            {(() => {
              const r = 50;
              const sx = A.x + r * Math.sin(0);
              const sy = A.y + r * Math.cos(0);
              const ex = A.x + r * Math.sin(alphaRad);
              const ey = A.y + r * Math.cos(alphaRad);
              const sweep = alphaDeg >= 0 ? 1 : 0;
              const large = Math.abs(alphaDeg) > 180 ? 1 : 0;
              return (
                <path d={`M ${sx} ${sy} A ${r} ${r} 0 ${large} ${sweep} ${ex} ${ey}`}
                  fill="none" stroke="#f97316" strokeWidth="2.5" />
              );
            })()}

            {/* L 端繩索（A→L） */}
            <line x1={A.x} y1={A.y} x2={L.x} y2={L.y} stroke="#0ea5e9" strokeWidth="3" />
            <text x={A.x + 6} y={(A.y + L.y) / 2} fontSize="12" fill="#0ea5e9" fontWeight="bold">
              T_L = {fmt(T_L, 2)} kN
            </text>

            {/* P 端繩索（A→P） */}
            <line x1={A.x} y1={A.y} x2={P.x} y2={P.y} stroke="#0ea5e9" strokeWidth="3" />
            <text x={(A.x + P.x) / 2 + (alphaDeg >= 0 ? 8 : -90)} y={(A.y + P.y) / 2 - 6}
              fontSize="12" fill="#0ea5e9" fontWeight="bold">
              T_P = {fmt(data.T_P, 2)} kN
            </text>

            {/* 合力箭頭 R（A 端承受的合力） */}
            {(() => {
              const Rlen = Math.hypot(data.Rx, data.Ry) || 1;
              const k = Math.min(140, data.Rmag * 70);
              const tipX = A.x + (data.Rx / Rlen) * k;
              const tipY = A.y + (data.Ry / Rlen) * k;
              const ang = toDeg(Math.atan2(data.Ry, data.Rx));
              return (
                <g>
                  <line x1={A.x} y1={A.y} x2={tipX} y2={tipY} stroke="#ef4444" strokeWidth="5" />
                  <polygon points={`0,-7 14,0 0,7`} fill="#ef4444"
                    transform={`translate(${tipX},${tipY}) rotate(${ang})`} />
                  <rect x={tipX + 12} y={tipY - 14} rx="4" width="120" height="26" fill="#fef2f2" stroke="#ef4444" />
                  <text x={tipX + 18} y={tipY + 4} fontSize="13" fill="#b91c1c" fontWeight="bold" fontFamily="monospace">
                    R = {fmt(data.Rmag, 2)} kN
                  </text>
                </g>
              );
            })()}

            {/* 角度文字（最上層，覆蓋於紅色箭頭之上） */}
            {(() => {
              const r = 50;
              const labelX = A.x + (r + 22) * Math.sin(alphaRad / 2);
              const labelY = A.y + (r + 22) * Math.cos(alphaRad / 2) + 5;
              const labelText = `α = ${data.absAlpha.toFixed(1)}°`;
              const w = 90, h = 24;
              return (
                <g>
                  <rect x={labelX - w / 2} y={labelY - h / 2 - 4} width={w} height={h} rx="6"
                    fill="#ffffff" fillOpacity="0.95" stroke="#f97316" strokeWidth="1.5" />
                  <text x={labelX} y={labelY + 3} textAnchor="middle"
                    fontSize="14" fill="#f97316" fontWeight="bold">
                    {labelText}
                  </text>
                </g>
              );
            })()}

            {/* 固定點 A（不可拖曳，僅以小圓點標示） */}
            <g>
              <circle cx={A.x} cy={A.y} r="4" fill="#1f2937" />
              <text x={A.x + 10} y={A.y - 8} fontSize="11" fill="#475569" fontWeight="bold">A（固定點）</text>
            </g>

            {/* P 拉力（可拖曳） */}
            <g
              onPointerDown={(e) => {
                e.target.setPointerCapture(e.pointerId);
                setDragging(true);
              }}
              className="cursor-grab active:cursor-grabbing">
              {/* 加大透明點擊區 */}
              <circle cx={P.x} cy={P.y} r="28" fill="transparent" />
              <circle cx={P.x} cy={P.y} r="16" fill="#0ea5e9" stroke="#ffffff" strokeWidth="3" />
              <text x={P.x} y={P.y + 4} textAnchor="middle" fontSize="12" fontWeight="bold" fill="#ffffff">P</text>
              <text x={P.x + 20} y={P.y - 14} fontSize="11" fill="#0369a1" fontWeight="bold">↻ 拖曳我</text>
            </g>

            {/* L 負載（不可拖曳，永遠在下方） */}
            <g>
              <line x1={A.x} y1={A.y} x2={L.x} y2={L.y - 22} stroke="#0ea5e9" strokeWidth="3" />
              <rect x={L.x - 26} y={L.y - 22} width="52" height="44" rx="6" fill="#64748b" stroke="#334155" strokeWidth="2" />
              <text x={L.x} y={L.y + 2} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#ffffff">100 kg</text>
              <text x={L.x} y={L.y + 14} textAnchor="middle" fontSize="9" fill="#cbd5e1">負載 L</text>
              {/* 重力箭頭 */}
              <line x1={L.x} y1={L.y + 26} x2={L.x} y2={L.y + 60} stroke="#dc2626" strokeWidth="3" />
              <polygon points={`${L.x - 6},${L.y + 56} ${L.x + 6},${L.y + 56} ${L.x},${L.y + 66}`} fill="#dc2626" />
              <text x={L.x + 12} y={L.y + 54} fontSize="11" fill="#dc2626" fontWeight="bold">g</text>
            </g>
          </svg>
        </div>

        <div className="mt-3 grid md:grid-cols-2 gap-3 text-xs">
          <div className="bg-white border border-slate-200 rounded p-3">
            <div className="font-bold text-slate-700 mb-1">力學說明</div>
            <div className="text-slate-600 leading-relaxed">
              T_L 為負載重力（恆定 {fmt(T_L,2)} kN）。T_P 為操作端拉力，依 Capstan
              方程 e^(μθ) 修正（緊邊 = {tight}）。固定點 A 承受兩端張力的向量和 R。
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded p-3">
            <div className="font-bold text-slate-700 mb-1">操作提示</div>
            <ul className="text-slate-600 list-disc pl-4 space-y-0.5">
              <li>α = 0°：P 與 L 同方向 → A 承受 2 倍張力（U 形迴轉）</li>
              <li>α = 180°：P 與 L 反向 → 兩端力相減，A 接近零負荷</li>
              <li>固定點 A 與負載 L 已鎖定，僅 P 可移動</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 7（新增）：機械倍力系統 MA System
// ========================================================================
function MAModule() {
  const [load_kgf, setLoad] = useState(100);
  const [ratio, setRatio] = useState(3);          // 1, 2, 3, 4, 5, 6, 7, 9
  const [efficiency, setEfficiency] = useState(0.9); // 滑輪效率（每段）

  // 理論輸入力 = 載重 / 倍率
  const load_kN = (load_kgf * G) / 1000;
  const idealInput_kN = load_kN / ratio;
  // 實際 = 理論 / 累積效率（簡化模型：每多一段乘上效率）
  const realRatio = (1 - Math.pow(efficiency, ratio)) / (1 - efficiency); // 級數和近似
  const realInput_kN = load_kN / realRatio;
  const lossPct = ((realInput_kN - idealInput_kN) / idealInput_kN) * 100;

  const presets = [
    { name: '1:1 直拉', ratio: 1 },
    { name: '2:1 滑輪', ratio: 2 },
    { name: '3:1 Z-rig', ratio: 3 },
    { name: '4:1', ratio: 4 },
    { name: '5:1 Compound', ratio: 5 },
    { name: '6:1', ratio: 6 },
    { name: '7:1', ratio: 7 },
    { name: '9:1', ratio: 9 },
  ];

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">7. 機械倍力系統 — Mechanical Advantage</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            倍力系統可大幅減少救援者出力，但每個滑輪都會損失 5–15%。
            公式（級數）：<code className="text-blue-300 bg-slate-800 px-1 rounded">η_total = (1−η^n) / (1−η)</code>
          </p>
        </div>

        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="負載 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
          <div>
            <div className="text-sm font-medium text-slate-300 mb-2">倍率</div>
            <div className="grid grid-cols-4 gap-2">
              {presets.map(p => (
                <button key={p.ratio} onClick={() => setRatio(p.ratio)}
                  className={`px-2 py-1.5 rounded text-xs font-medium transition-colors ${
                    ratio === p.ratio ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                  {p.name}
                </button>
              ))}
            </div>
          </div>
          <Slider label="滑輪效率 η" value={efficiency} min={0.7} max={1.0} step={0.01} unit="" onChange={setEfficiency}
            hint="高品質球軸承 0.95 · 一般滑輪 0.90 · 鉤環變向 0.70" />
        </div>
      </div>

      <div className="space-y-4 flex flex-col">
        <div className="grid grid-cols-2 gap-4">
          <ForceCard title="理論輸入力" kN={idealInput_kN} colorClass="text-green-400" description={`載重 ÷ ${ratio}`} />
          <ForceCard title="實際輸入力" kN={realInput_kN} colorClass="text-yellow-400" description={`效率損失 ${fmt(lossPct,0)}%`} />
        </div>
        <NumberCard title="實效倍率" value={fmt(realRatio,2)} unit=":1" colorClass="text-blue-400"
          description={`理論 ${ratio}:1 · 損失 ${fmt(lossPct,0)}%`} />
        <NfpaBadge force_kN={load_kN * (ratio === 1 ? 1 : 1.2)} />
        <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 p-4 text-xs text-slate-400 space-y-1">
          <div className="text-slate-200 font-bold mb-2">救援操作備註：</div>
          <div>• Whistle Test：放手時系統會否危險？倍力系統需配備制動器（Prusik / 抓結）</div>
          <div>• Critical Point：分析全系統最弱環節，依 NFPA SWL 預估</div>
          <div>• 倍率越高 → 效率損失越大、繩索消耗越快、救援距離越短</div>
          <div>• 高倍率（5:1+）建議用 Compound 系統而非單純 Simple</div>
        </div>
      </div>
    </div>
  );
}
