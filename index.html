<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ========================================================================
// 常數：NFPA 1983 / UIAA / 單位換算
// ========================================================================
const G = 9.80665;                 // m/s²
const KGF_PER_KN = 1000 / G;       // 1 kN ≈ 101.97 kgf
const LBF_PER_KN = 224.809;

// NFPA 1983 (2017 ed.) 繩索與系統強度
const NFPA = {
  G_RATED: { name: 'G (General Use)', mbs_kN: 40, swl_kN: 40 / 15, ratio: 15, persons: 2, color: '#22c55e' },
  T_RATED: { name: 'T (Technical Use)', mbs_kN: 20, swl_kN: 20 / 10, ratio: 10, persons: 1, color: '#3b82f6' },
  E_RATED: { name: 'E (Escape)', mbs_kN: 13.5, swl_kN: 13.5 / 10, ratio: 10, persons: 1, color: '#a855f7' },
};

// 人體承受門檻 (kN) — UIAA / OSHA / ANSI Z359
const HUMAN_THRESHOLDS = [
  { max: 4,  label: '安全範圍',         color: 'text-green-400',   bg: 'bg-green-500/10' },
  { max: 6,  label: 'UIAA 安全帶上限',  color: 'text-yellow-400',  bg: 'bg-yellow-500/10' },
  { max: 8,  label: 'OSHA PFAS 上限',   color: 'text-orange-400',  bg: 'bg-orange-500/10' },
  { max: 12, label: '嚴重內傷風險',     color: 'text-red-400',     bg: 'bg-red-500/10' },
  { max: Infinity, label: '可能致命 / 超 NFPA G MBS', color: 'text-red-500 font-bold', bg: 'bg-red-600/20' },
];

const evalHuman = (kN) => HUMAN_THRESHOLDS.find(t => kN <= t.max);

// 評估安全係數
const evalNfpa = (force_kN, rating) => {
  const r = NFPA[rating];
  const sf = r.mbs_kN / force_kN;
  let level = 'pass', text = `安全係數 ${sf.toFixed(1)}:1 (≥ ${r.ratio}:1)`, color = 'text-green-400';
  if (sf < r.ratio && sf >= r.ratio * 0.6) { level = 'warn'; text = `⚠ 安全係數 ${sf.toFixed(1)}:1 (低於 ${r.ratio}:1)`; color = 'text-yellow-400'; }
  if (sf < r.ratio * 0.6 && sf >= 1) { level = 'fail'; text = `❌ 安全係數 ${sf.toFixed(1)}:1 (嚴重不足)`; color = 'text-orange-400'; }
  if (sf < 1) { level = 'crit'; text = `☠ 超過 MBS ${r.mbs_kN}kN`; color = 'text-red-500 font-bold'; }
  return { sf, level, text, color };
};

// ========================================================================
// 工具函式
// ========================================================================
const toRad = (d) => (d * Math.PI) / 180;
const toDeg = (r) => (r * 180) / Math.PI;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const kNtoKgf = (kN) => kN * KGF_PER_KN;
const fmt = (v, d=1) => Number(v).toFixed(d);

// 截圖：合成 video（背景）+ SVG（前景），輸出 PNG
async function captureSVGWithVideo(svgEl, videoEl, W, H, filename) {
  if (!svgEl) return false;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  // 背景：相機畫面（cover 縮放）或深色底
  if (videoEl && videoEl.srcObject && videoEl.videoWidth > 0) {
    const vRatio = videoEl.videoWidth / videoEl.videoHeight;
    const cRatio = W / H;
    let dw, dh, dx, dy;
    if (vRatio > cRatio) { dh = H; dw = dh * vRatio; dx = (W - dw) / 2; dy = 0; }
    else { dw = W; dh = dw / vRatio; dx = 0; dy = (H - dh) / 2; }
    ctx.drawImage(videoEl, dx, dy, dw, dh);
  } else {
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, W, H);
  }
  // SVG 圖層
  let svgStr = new XMLSerializer().serializeToString(svgEl);
  if (!svgStr.includes('xmlns="http://www.w3.org/2000/svg"')) {
    svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  }
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  try {
    await new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0, W, H); res(); };
      img.onerror = rej;
      img.src = url;
    });
  } finally {
    URL.revokeObjectURL(url);
  }
  // 下載 PNG
  return new Promise((res) => {
    canvas.toBlob(b => {
      if (!b) { res(false); return; }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
      res(true);
    }, 'image/png');
  });
}

  };

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      {paths[name]}
    </svg>
  );
};

// ========================================================================
// 共用 UI
// ========================================================================
const Slider = ({ label, value, min, max, step, onChange, unit, hint, ariaLabel }) => (

// 力量顯示卡：統一以 kgf 顯示
const ForceCard = ({ title, kN, colorClass = 'text-white', description, accent }) => (

// NFPA 安全係數徽章
const NfpaBadge = ({ force_kN }) => {
  const [rating, setRating] = useState('G_RATED');
  const r = NFPA[rating];
  const e = evalNfpa(force_kN, rating);
  return (
    <div className="bg-slate-800/40 border border-slate-700 rounded-xl p-4 space-y-3">
      <div className="flex items-center justify-between flex-wrap gap-2">

        <div className="flex gap-1 text-xs">
          {Object.keys(NFPA).map(k => (
            <button key={k}
              onClick={() => setRating(k)}

          ))}

      </div>

      </div>

          width: `${Math.min(100, (force_kN / r.mbs_kN) * 100)}%`,

};

// ========================================================================
// 模組 1：Capstan 摩擦力 — 加上螺旋繪製、張力熱力圖
// ========================================================================
function FrictionModule() {
  const [load_kgf, setLoad] = useState(100);                  // 載重 kgf
  const [turns, setTurns] = useState(1);
  const [mu, setMu] = useState(0.2);

  const load_kN = (load_kgf * G) / 1000;
  const theta = turns * 2 * Math.PI;
  const gain = Math.exp(mu * theta);
  const hold_kN = load_kN / gain;
  const friction_kN = load_kN - hold_kN;

  // 螺旋繞線 path
  const spiralPath = useMemo(() => {
    const cx = 100, cy = 100, r0 = 40, dr = 4;
    const totalAngle = theta;
    const steps = Math.max(40, Math.ceil(totalAngle * 8));
    let d = '';
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const a = Math.PI / 2 + t * totalAngle;
      const r = r0 + t * dr * Math.min(1, turns);
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
    }
    return d;
  }, [theta, turns]);

  return (
    <div className="space-y-6">
      <div className="grid md:grid-cols-2 gap-8">
        <div className="space-y-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-100 mb-2">1. 繩索摩擦力 — Capstan Equation</h2>
            <p className="text-slate-400 text-sm leading-relaxed">
              繩索纏繞於圓柱（鉤環、樹幹、下降器）時，摩擦力以指數成長。
              公式：<code className="text-blue-300 bg-slate-800 px-1 rounded">T₁ = T₂ × e^(μθ)</code>
            </p>
          </div>
          <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
            <Slider label="載重 (T₁)" value={load_kgf} min={10} max={500} step={10} unit="kgf" onChange={setLoad} />
            <Slider label="纏繞圈數 (θ)" value={turns} min={0} max={4} step={0.25} unit="圈" onChange={setTurns} />
            <Slider label="摩擦係數 (μ)" value={mu} min={0.1} max={0.8} step={0.05} unit="" onChange={setMu}
              hint="0.2 金屬鉤環/確保器 · 0.4 乾燥樹幹 · 0.6 粗糙岩石" />
          </div>
        </div>

        <div className="space-y-4 flex flex-col">
          <div className="grid grid-cols-2 gap-4">
            <ForceCard title="所需制動力 (T₂)" kN={hold_kN} colorClass="text-green-400" description="您需要施加的力" />
            <ForceCard title="摩擦力 (T₁−T₂)" kN={friction_kN} colorClass="text-blue-400" description="圓柱吸收的力" />
          </div>
          <NumberCard title="放大倍數" value={fmt(gain, 1)} unit="倍" colorClass="text-purple-400"
            description={turns === 0 ? '未纏繞' : `${turns} 圈 × μ=${mu}`} />

          <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-center p-4 min-h-[220px]">
            <svg viewBox="0 0 200 220" className="w-full h-full max-h-64">
              <circle cx="100" cy="100" r="40" fill="#334155" stroke="#475569" strokeWidth="3" />
              <text x="100" y="104" fill="#94a3b8" fontSize="10" textAnchor="middle">μ = {mu}</text>

              <path d={spiralPath} fill="none" stroke="#f59e0b" strokeWidth="3" strokeLinecap="round" />

              <line x1="60" y1="140" x2="60" y2="200" stroke="#ef4444" strokeWidth="5" />
              <polygon points="55,200 65,200 60,210" fill="#ef4444" />
              <text x="60" y="218" fill="#ef4444" fontSize="11" fontWeight="bold" textAnchor="middle">T₁ {load_kgf} kgf</text>

              <line x1="140" y1="100" x2="140" y2="20" stroke="#22c55e" strokeWidth={Math.max(1.5, 5 - turns)} />
              <polygon points="135,30 145,30 140,18" fill="#22c55e" />
              <text x="140" y="14" fill="#22c55e" fontSize="11" fontWeight="bold" textAnchor="middle">T₂ {fmt(kNtoKgf(hold_kN),0)} kgf</text>
            </svg>
          </div>
        </div>
      </div>

      {/* === 進階解讀：Over The Edge Rescue 三部曲實測 === */}
      <div className="bg-gradient-to-br from-sky-950/30 to-slate-900 border border-sky-800/40 rounded-xl p-5 space-y-4">
        <div className="flex items-start gap-3 flex-wrap">
          <div className="bg-red-600 text-white px-2 py-1 rounded text-xs font-bold">▶ YouTube 系列</div>
          <div className="flex-1 min-w-[200px]">
            <div className="text-sky-200 font-bold text-base">
              進階解讀：「一個鉤環 vs 兩個鉤環，哪個摩擦力較大？」三部曲
            </div>
            <div className="text-slate-400 text-xs mt-0.5">

            </div>
          </div>
        </div>

        {/* 三部曲說明卡 */}
        <div className="grid md:grid-cols-3 gap-3">
          <div className="bg-slate-950/60 rounded-lg p-3 border border-slate-800">
            <div className="text-xs text-sky-400 font-bold mb-1">PART 1 · 摩擦係數理論</div>
            <a href="https://www.youtube.com/watch?v=1r21sGpqd3w" target="_blank" rel="noopener noreferrer"
              className="text-xs text-slate-200 hover:text-sky-300 underline-offset-2 hover:underline block mb-2">
              Coefficient of Friction Testing ↗
            </a>
            <div className="text-xs text-slate-400 leading-relaxed">
              用 Capstan 公式推導：單鉤環包覆角為 180°（半圓）；雙鉤環為 2×90° 也等於 180°。
              <strong className="text-sky-300">理論上摩擦力相同</strong>。
            </div>
          </div>

          <div className="bg-slate-950/60 rounded-lg p-3 border border-slate-800">
            <div className="text-xs text-sky-400 font-bold mb-1">PART 2 · 慢拉測試</div>
            <a href="https://www.youtube.com/watch?v=l9wy479rKcw" target="_blank" rel="noopener noreferrer"
              className="text-xs text-slate-200 hover:text-sky-300 underline-offset-2 hover:underline block mb-2">
              Slow Pull Tests ↗
            </a>
            <div className="text-xs text-slate-400 leading-relaxed">
              在 50 kN 試驗台上實測「最大可單手控制力 Max Force」。
              Munter 結加第二個鉤環只多 <strong className="text-sky-300">0.1 kN</strong>，幾乎可忽略。
            </div>
          </div>

          <div className="bg-slate-950/60 rounded-lg p-3 border border-slate-800">
            <div className="text-xs text-sky-400 font-bold mb-1">PART 3 · 實際垂降</div>
            <a href="https://www.youtube.com/watch?v=kOf7zMUQPDc" target="_blank" rel="noopener noreferrer"
              className="text-xs text-slate-200 hover:text-sky-300 underline-offset-2 hover:underline block mb-2">
              Practical Abseil Tests ↗
            </a>
            <div className="text-xs text-slate-400 leading-relaxed">
              真人實際垂降驗證：Munter 加第二個鉤環體感差不多；Reverso 在細繩時加鉤環有感；
              <strong className="text-sky-300">「多繞一圈」效果遠大於加鉤環</strong>。
            </div>

// ========================================================================
// 模組 2：Highline 索道張力 — 兩端可拖曳 + 相機 AR 疊圖 + 格線
// ========================================================================
function HighlineModule() {
  const W = 800, H = 480;
  const [load_kgf, setLoad] = useState(100);
  const load_kN = (load_kgf * G) / 1000;

  // 兩個錨點與負載皆可拖曳
  const [anchorL, setAnchorL] = useState({ x: W * 0.15, y: H * 0.20 });
  const [anchorR, setAnchorR] = useState({ x: W * 0.85, y: H * 0.20 });
  const [loadPos, setLoadPos] = useState({ x: W * 0.50, y: H * 0.55 });

  // 相機 / 格線 / 全螢幕 / 截圖
  const [cameraOn, setCameraOn] = useState(false);
  const [showGrid, setShowGrid] = useState(true);
  const [fullscreen, setFullscreen] = useState(false);
  const [cameraError, setCameraError] = useState('');
  const [shotMsg, setShotMsg] = useState('');
  const videoRef = useRef(null);
  const svgRef = useRef(null);
  const [drag, setDrag] = useState(null);

  const takeScreenshot = useCallback(async () => {
    const ok = await captureSVGWithVideo(svgRef.current, videoRef.current, W, H,
      `highline_${Date.now()}.png`);
    setShotMsg(ok ? '✓ 截圖已儲存' : '✗ 截圖失敗');
    setTimeout(() => setShotMsg(''), 2000);
  }, [W, H]);

  useEffect(() => {
    let stream = null;
    if (cameraOn) {
      navigator.mediaDevices?.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => {
          stream = s;
          if (videoRef.current) {
            videoRef.current.srcObject = s;
          }
          setCameraError('');
        })
        .catch(err => {
          setCameraError('無法存取相機：' + (err.message || err.name) + '（需 HTTPS 或 localhost）');
          setCameraOn(false);
        });
    }
    return () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (videoRef.current) videoRef.current.srcObject = null;
    };
  }, [cameraOn]);

  // 力學計算（向量平衡）
  const data = useMemo(() => {
    // 從 load 指向兩個錨點的向量（張力沿此方向作用於 load）
    const dxL = anchorL.x - loadPos.x, dyL = anchorL.y - loadPos.y;
    const dxR = anchorR.x - loadPos.x, dyR = anchorR.y - loadPos.y;
    const lenL = Math.hypot(dxL, dyL) || 1;
    const lenR = Math.hypot(dxR, dyR) || 1;
    const uL = { x: dxL / lenL, y: dyL / lenL };
    const uR = { x: dxR / lenR, y: dyR / lenR };

    // 解線性系統：T_L·uL + T_R·uR + (0, +W) = 0
    const det = uL.x * uR.y - uR.x * uL.y;
    let T_L_kN = 0, T_R_kN = 0;
    if (Math.abs(det) > 1e-6) {
      T_L_kN = ( 0 * uR.y - uR.x * (-load_kN)) / det;
      T_R_kN = (uL.x * (-load_kN) - 0 * uL.y) / det;
    }

    // 角度（從水平線量起，正值代表錨點高於 load）
    const thetaL_deg = toDeg(Math.atan2(-dyL, Math.abs(dxL)));
    const thetaR_deg = toDeg(Math.atan2(-dyR, Math.abs(dxR)));

    // 兩繩之間的夾角（在 load 點上量測）= 兩錨點間的中央夾角
    const cosInner = clamp(uL.x * uR.x + uL.y * uR.y, -1, 1);
    const innerAngle_deg = toDeg(Math.acos(cosInner));

    // 偏離量（負載相對兩錨點中心的水平偏移，pixel）
    const centerX = (anchorL.x + anchorR.x) / 2;
    const offset_px = loadPos.x - centerX;
    const span_px = Math.abs(anchorR.x - anchorL.x) || 1;
    const offsetRatio = offset_px / span_px; // 正值 = 偏右

    // 偏離點所需控制拉力（水平）：假設單繩等張力情境，
    // 解 T(uL+uR) + (0, +W) = (F_h, 0)
    //   垂直：T(uL.y + uR.y) + W = 0  → T = -W / (uL.y + uR.y)
    //   水平：F_h = -T·(uL.x + uR.x)  （外加力與繩拉力方向相反）
    const sumY = uL.y + uR.y;
    let F_h_kN = 0, T_uniform_kN = 0;
    if (sumY < -1e-3) {
      T_uniform_kN = -load_kN / sumY;
      F_h_kN = -T_uniform_kN * (uL.x + uR.x);
    }

    return {
      T_L_kN, T_R_kN, uL, uR, thetaL_deg, thetaR_deg, lenL, lenR,
      innerAngle_deg, offset_px, offsetRatio, F_h_kN, centerX,
    };
  }, [anchorL, anchorR, loadPos, load_kN]);

  // 拖曳處理
  const onMove = useCallback((e) => {
    if (!drag) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const sx = clamp((e.clientX - rect.left) * (W / rect.width), 16, W - 16);
    const sy = clamp((e.clientY - rect.top) * (H / rect.height), 16, H - 16);
    if (drag === 'L') setAnchorL({ x: sx, y: sy });
    if (drag === 'R') setAnchorR({ x: sx, y: sy });
    if (drag === 'W') setLoadPos({ x: sx, y: sy });
  }, [drag]);

  // 安全評估（取兩側較大值）
  const maxT_kN = Math.max(Math.abs(data.T_L_kN), Math.abs(data.T_R_kN));
  const human = evalHuman(maxT_kN);
  const minTheta = Math.min(data.thetaL_deg, data.thetaR_deg);
  const lowAngle = minTheta < 5 && minTheta >= 0;
  const invalid = data.T_L_kN < 0 || data.T_R_kN < 0; // 負張力 = 無解（錨點低於負載）

  // 格線間距
  const GRID = 40;

  return (
    <div className="space-y-4">
      <div className="grid md:grid-cols-2 gap-8">
        <div className="space-y-4">
          <div>
            <h2 className="text-2xl font-bold text-slate-100 mb-2">2. 索道繩固定點張力 — Highline</h2>
            <p className="text-slate-400 text-sm leading-relaxed">
              兩端錨點與負載皆可<strong className="text-blue-300">自由拖曳</strong>。
              下垂角越小、中央夾角越接近 180°，張力呈倍數放大。
              對稱：<code className="text-blue-300 bg-slate-800 px-1 rounded">T = W / (2sinθ)</code>；
              不對稱：解向量平衡 <code className="text-blue-300 bg-slate-800 px-1 rounded">T_L·u_L + T_R·u_R + W = 0</code>
              <br/><span className="text-yellow-400">救援實務：θ &lt; 5°（中央夾角 &gt; 170°）即視為高風險（10% 規則）</span>
              <br/><span className="text-orange-400">負載偏離中心時，會出現水平控制拉力 F_控</span>
            </p>
          </div>
          <div className="space-y-3 bg-slate-800/50 p-4 rounded-xl">
            <Slider label="中央載重 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
            <div className="flex flex-wrap gap-2 text-xs">
              <button onClick={() => setCameraOn(!cameraOn)}
                className={`px-3 py-1.5 rounded font-medium transition-colors ${cameraOn ? 'bg-red-600 hover:bg-red-700 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-200'}`}>
                {cameraOn ? '⏹ 停止相機' : '📷 啟用相機 AR'}
              </button>
              <label className="flex items-center gap-1.5 px-3 py-1.5 rounded bg-slate-700 text-slate-200 cursor-pointer">
                <input type="checkbox" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} />
                顯示格線
              </label>
              <button onClick={() => setFullscreen(true)}
                className="px-3 py-1.5 rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium">
                🖥 放大畫布
              </button>
              <button onClick={takeScreenshot}
                className="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium">
                📸 截圖
              </button>
              <button onClick={() => {
                setAnchorL({ x: W * 0.15, y: H * 0.20 });
                setAnchorR({ x: W * 0.85, y: H * 0.20 });
                setLoadPos({ x: W * 0.50, y: H * 0.55 });
              }} className="px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-200">
                重置位置
              </button>
              {shotMsg && <span className="self-center text-emerald-400 font-medium">{shotMsg}</span>}
            </div>
            {cameraError && (
              <div className="text-xs text-red-400 bg-red-950/40 border border-red-800 rounded p-2">
                {cameraError}
              </div>
            )}
            <div className="text-xs text-slate-500 leading-relaxed">
              💡 提示：相機 AR 需要 HTTPS 環境（GitHub Pages 自動支援）。
              拖曳兩個灰色 ▲ 錨點調整索道形狀，拖曳紅色負載觀察張力如何變化。
            </div>
          </div>
        </div>

        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <ForceCard title="左側張力 T_L" kN={Math.max(0, data.T_L_kN)}
              colorClass={data.T_L_kN > load_kN * 2 ? 'text-red-400' : data.T_L_kN > load_kN ? 'text-yellow-400' : 'text-green-400'}
              description={`θ_L = ${fmt(data.thetaL_deg,1)}°`} />
            <ForceCard title="右側張力 T_R" kN={Math.max(0, data.T_R_kN)}
              colorClass={data.T_R_kN > load_kN * 2 ? 'text-red-400' : data.T_R_kN > load_kN ? 'text-yellow-400' : 'text-green-400'}
              description={`θ_R = ${fmt(data.thetaR_deg,1)}°`} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <NumberCard title="中央夾角 ∠AWB" value={fmt(data.innerAngle_deg, 1)} unit="°"
              colorClass={data.innerAngle_deg > 170 ? 'text-red-400' : data.innerAngle_deg > 150 ? 'text-yellow-400' : 'text-purple-400'}
              description={data.innerAngle_deg > 170 ? '⚠ 接近水平，張力暴增' : '兩繩在負載點的夾角'} />
            <ForceCard title={Math.abs(data.offsetRatio) < 0.02 ? '偏離拉力（置中）' : `偏離拉力（${data.offsetRatio > 0 ? '偏右' : '偏左'}）`}
              kN={Math.abs(data.F_h_kN)}
              colorClass={Math.abs(data.F_h_kN) > load_kN ? 'text-orange-400' : 'text-blue-400'}
              description={Math.abs(data.offsetRatio) < 0.02 ? '無需控制力' : `偏移 ${fmt(Math.abs(data.offsetRatio) * 100, 0)}%`} />
          </div>
          <NfpaBadge force_kN={maxT_kN} />
          {lowAngle && (
            <div className="bg-red-950/40 border border-red-800 rounded p-2 text-xs text-red-300">
              ⚠ 至少一側下垂角 &lt; 5°，違反救援 10% 規則
            </div>
          )}
          {invalid && (
            <div className="bg-orange-950/40 border border-orange-800 rounded p-2 text-xs text-orange-300">
              ⚠ 幾何無效：負載必須位於兩錨點下方才能形成索道
            </div>
          )}
        </div>
      </div>

      {/* 全寬互動畫布（支援全螢幕放大） */}
      <div className={fullscreen
        ? 'fixed inset-0 z-50 bg-slate-950 flex flex-col'
        : 'relative bg-slate-950 rounded-xl border border-slate-800 overflow-hidden'}>
        {fullscreen && (
          <div className="bg-slate-900/90 backdrop-blur px-3 py-2 flex justify-between items-center gap-2 border-b border-slate-700">
            <span className="text-slate-200 font-bold text-sm">索道張力分析 — 全螢幕模式</span>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => setCameraOn(!cameraOn)}
                className={`px-3 py-1.5 rounded text-xs font-medium ${cameraOn ? 'bg-red-600 text-white' : 'bg-slate-700 text-slate-200'}`}>
                {cameraOn ? '⏹ 相機' : '📷 相機'}
              </button>
              <label className="flex items-center gap-1 px-3 py-1.5 rounded bg-slate-700 text-slate-200 text-xs cursor-pointer">
                <input type="checkbox" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} />格線
              </label>
              <button onClick={takeScreenshot}
                className="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium">📸 截圖</button>
              <button onClick={() => setFullscreen(false)}
                className="px-3 py-1.5 rounded bg-slate-600 hover:bg-slate-500 text-white text-xs font-medium">⏏ 退出</button>
              {shotMsg && <span className="self-center text-emerald-400 text-xs">{shotMsg}</span>}
            </div>
          </div>
        )}

        <div className={fullscreen ? 'flex-1 flex items-center justify-center overflow-hidden' : 'relative'}>
          <div className={fullscreen
              ? 'relative max-w-full max-h-full'
              : 'relative w-full'}
            style={{ aspectRatio: `${W} / ${H}`, ...(fullscreen ? { width: 'min(100%, calc(100vh * 800 / 480))' } : {}) }}>
            {/* 相機背景層 */}
            {cameraOn && (
              <video ref={videoRef} autoPlay playsInline muted
                className="absolute inset-0 w-full h-full object-cover" />
            )}

            <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
              className="absolute inset-0 w-full h-full select-none touch-none z-10"
              preserveAspectRatio="xMidYMid meet"
              onPointerMove={onMove}
              onPointerUp={() => setDrag(null)}
              onPointerLeave={() => setDrag(null)}>

          {/* 格線（可選） */}
          {showGrid && (
            <g opacity={cameraOn ? 0.5 : 1}>
              {Array.from({ length: Math.ceil(W / GRID) + 1 }, (_, i) => (
                <line key={`gv${i}`} x1={i * GRID} y1={0} x2={i * GRID} y2={H}
                  stroke={cameraOn ? '#22d3ee' : '#1e293b'} strokeWidth={i % 5 === 0 ? 1.2 : 0.5}
                  strokeDasharray={i % 5 === 0 ? 'none' : '2 4'} />
              ))}
              {Array.from({ length: Math.ceil(H / GRID) + 1 }, (_, i) => (
                <line key={`gh${i}`} x1={0} y1={i * GRID} x2={W} y2={i * GRID}
                  stroke={cameraOn ? '#22d3ee' : '#1e293b'} strokeWidth={i % 5 === 0 ? 1.2 : 0.5}
                  strokeDasharray={i % 5 === 0 ? 'none' : '2 4'} />
              ))}
              {/* 中心十字準星 */}
              <line x1={W/2 - 12} y1={H/2} x2={W/2 + 12} y2={H/2} stroke="#fbbf24" strokeWidth="1.5" />
              <line x1={W/2} y1={H/2 - 12} x2={W/2} y2={H/2 + 12} stroke="#fbbf24" strokeWidth="1.5" />
              <circle cx={W/2} cy={H/2} r="3" fill="#fbbf24" />
            </g>
          )}

          {/* 水平參考線（兩錨點間） */}
          <line x1={anchorL.x} y1={anchorL.y} x2={anchorR.x} y2={anchorL.y}
            stroke="#475569" strokeWidth="1" strokeDasharray="3 4" opacity="0.5" />

          {/* 索道繩 */}
          <path d={`M ${anchorL.x} ${anchorL.y} L ${loadPos.x} ${loadPos.y} L ${anchorR.x} ${anchorR.y}`}
            fill="none" stroke="#f59e0b" strokeWidth="3" />

          {/* 角度弧（左） */}
          {data.thetaL_deg > 0 && data.thetaL_deg < 89 && (
            <g>
              <path d={`M ${anchorL.x + 30} ${anchorL.y} A 30 30 0 0 1 ${anchorL.x + 30 * Math.cos(toRad(data.thetaL_deg))} ${anchorL.y + 30 * Math.sin(toRad(data.thetaL_deg))}`}
                fill="none" stroke="#c084fc" strokeWidth="1.5" />
              <text x={anchorL.x + 38} y={anchorL.y + 20} fontSize="13" fill="#c084fc" fontWeight="bold">
                θ_L={fmt(data.thetaL_deg,1)}°
              </text>
            </g>
          )}

          {/* 角度弧（右） */}
          {data.thetaR_deg > 0 && data.thetaR_deg < 89 && (
            <g>
              <path d={`M ${anchorR.x - 30} ${anchorR.y} A 30 30 0 0 0 ${anchorR.x - 30 * Math.cos(toRad(data.thetaR_deg))} ${anchorR.y + 30 * Math.sin(toRad(data.thetaR_deg))}`}
                fill="none" stroke="#c084fc" strokeWidth="1.5" />
              <text x={anchorR.x - 90} y={anchorR.y + 20} fontSize="13" fill="#c084fc" fontWeight="bold">
                θ_R={fmt(data.thetaR_deg,1)}°
              </text>
            </g>
          )}

          {/* 張力箭頭：從錨點指向 load（沿繩索方向）— 表示繩索拉錨點的力 */}
          {(() => {
            // 在錨點處，繩索往 load 方向拉
            const aL_to_L = { x: loadPos.x - anchorL.x, y: loadPos.y - anchorL.y };
            const aR_to_L = { x: loadPos.x - anchorR.x, y: loadPos.y - anchorR.y };
            const lL = Math.hypot(aL_to_L.x, aL_to_L.y) || 1;
            const lR = Math.hypot(aR_to_L.x, aR_to_L.y) || 1;
            const scaleL = Math.min(80, Math.abs(data.T_L_kN) * 40);
            const scaleR = Math.min(80, Math.abs(data.T_R_kN) * 40);
            const tipLx = anchorL.x + (aL_to_L.x / lL) * scaleL;
            const tipLy = anchorL.y + (aL_to_L.y / lL) * scaleL;
            const tipRx = anchorR.x + (aR_to_L.x / lR) * scaleR;
            const tipRy = anchorR.y + (aR_to_L.y / lR) * scaleR;
            const angL = toDeg(Math.atan2(aL_to_L.y, aL_to_L.x));
            const angR = toDeg(Math.atan2(aR_to_L.y, aR_to_L.x));
            return (
              <g>
                {/* 左側張力箭頭 */}
                <line x1={anchorL.x} y1={anchorL.y} x2={tipLx} y2={tipLy} stroke="#ef4444" strokeWidth="4" />
                <polygon points="0,-6 12,0 0,6" fill="#ef4444"
                  transform={`translate(${tipLx},${tipLy}) rotate(${angL})`} />

                {/* 右側張力箭頭 */}
                <line x1={anchorR.x} y1={anchorR.y} x2={tipRx} y2={tipRy} stroke="#ef4444" strokeWidth="4" />
                <polygon points="0,-6 12,0 0,6" fill="#ef4444"
                  transform={`translate(${tipRx},${tipRy}) rotate(${angR})`} />
              </g>
            );
          })()}

          {/* 重力向量（從 load 向下） */}
          <line x1={loadPos.x} y1={loadPos.y} x2={loadPos.x} y2={loadPos.y + 50}
            stroke="#dc2626" strokeWidth="3" strokeDasharray="6 3" />
          <polygon points={`${loadPos.x - 6},${loadPos.y + 46} ${loadPos.x + 6},${loadPos.y + 46} ${loadPos.x},${loadPos.y + 56}`} fill="#dc2626" />
          <text x={loadPos.x + 10} y={loadPos.y + 56} fontSize="12" fill="#dc2626" fontWeight="bold">
            W = {load_kgf} kgf
          </text>

          {/* 中央夾角（兩繩在 load 點之間的夾角） */}
          {(() => {
            const r = 38;
            const ang1 = Math.atan2(data.uL.y, data.uL.x);
            const ang2 = Math.atan2(data.uR.y, data.uR.x);
            // 從 uL 方向往 uR 方向劃弧，sweep 取最短路徑
            let delta = ang2 - ang1;
            while (delta > Math.PI) delta -= 2 * Math.PI;
            while (delta < -Math.PI) delta += 2 * Math.PI;
            const sweep = delta > 0 ? 1 : 0;
            const sx = loadPos.x + r * Math.cos(ang1);
            const sy = loadPos.y + r * Math.sin(ang1);
            const ex = loadPos.x + r * Math.cos(ang2);
            const ey = loadPos.y + r * Math.sin(ang2);
            const midAng = ang1 + delta / 2;
            const labelX = loadPos.x + (r + 30) * Math.cos(midAng);
            const labelY = loadPos.y + (r + 30) * Math.sin(midAng);
            return (
              <g>
                <path d={`M ${sx} ${sy} A ${r} ${r} 0 0 ${sweep} ${ex} ${ey}`}
                  fill="none" stroke="#c084fc" strokeWidth="2.5" />
                <rect x={labelX - 32} y={labelY - 11} width="64" height="22" rx="4"
                  fill="#1e1b4b" stroke="#c084fc" strokeWidth="1.5" opacity="0.95" />
                <text x={labelX} y={labelY + 4} textAnchor="middle"
                  fontSize="13" fill="#c084fc" fontWeight="bold">
                  ∠ {fmt(data.innerAngle_deg, 0)}°
                </text>
              </g>
            );
          })()}

          {/* 偏離指示：負載偏離兩錨點中心時，顯示水平控制拉力 */}
          {Math.abs(data.offsetRatio) > 0.02 && Math.abs(data.F_h_kN) > 0.05 && (() => {
            // 中心參考點：兩錨點中點正下方（同 load 高度）
            const refX = data.centerX;
            const refY = loadPos.y;
            const dirSign = data.offsetRatio > 0 ? 1 : -1; // 偏右 → 控制拉力指向右

            // 控制拉力箭頭：從負載出發，水平指向「使其更偏離」的方向
            // （此即外加力，抵抗繩的回復力）
            const len = Math.min(80, Math.abs(data.F_h_kN) * 40);
            const tipX = loadPos.x + dirSign * len;
            const tipY = loadPos.y;
            return (
              <g>
                {/* 中心參考垂直虛線 */}
                <line x1={refX} y1={anchorL.y - 10} x2={refX} y2={refY + 20}
                  stroke="#fbbf24" strokeWidth="1" strokeDasharray="3 5" opacity="0.6" />
                <text x={refX + 4} y={anchorL.y - 14} fontSize="10" fill="#fbbf24">中心</text>

                {/* 偏離量水平指示 */}
                <line x1={refX} y1={refY + 30} x2={loadPos.x} y2={refY + 30}
                  stroke="#fbbf24" strokeWidth="1.5" strokeDasharray="4 3" />
                <text x={(refX + loadPos.x) / 2} y={refY + 26} textAnchor="middle"
                  fontSize="10" fill="#fbbf24" fontWeight="bold">
                  偏離 {fmt(Math.abs(data.offsetRatio) * 100, 0)}%
                </text>

                {/* 水平控制拉力箭頭 */}
                <line x1={loadPos.x} y1={loadPos.y} x2={tipX} y2={tipY}
                  stroke="#fb923c" strokeWidth="4" />
                <polygon points={`0,-7 14,0 0,7`} fill="#fb923c"
                  transform={`translate(${tipX},${tipY}) rotate(${dirSign > 0 ? 0 : 180})`} />
                <rect x={tipX + (dirSign > 0 ? 12 : -130)} y={tipY - 14} width="118" height="26" rx="4"
                  fill="#431407" stroke="#fb923c" strokeWidth="1.5" />
                <text x={tipX + (dirSign > 0 ? 18 : -124)} y={tipY + 4} fontSize="12" fill="#fb923c" fontWeight="bold" fontFamily="monospace">
                  F_控 = {fmt(kNtoKgf(Math.abs(data.F_h_kN)), 0)} kgf
                </text>
              </g>
            );
          })()}

          {/* 左錨點（▲ 三角形） */}
          <g onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setDrag('L'); }}
            className="cursor-grab active:cursor-grabbing">
            <circle cx={anchorL.x} cy={anchorL.y} r="22" fill="transparent" />
            <polygon points={`${anchorL.x - 14},${anchorL.y + 14} ${anchorL.x + 14},${anchorL.y + 14} ${anchorL.x},${anchorL.y - 14}`}
              fill="#cbd5e1" stroke="#1e293b" strokeWidth="2" />
            <rect x={anchorL.x - 18} y={anchorL.y + 14} width="36" height="6" fill="#475569" />
          </g>
          {/* 左錨點張力標籤（最上層，避免被遮擋） */}
          <g>
            <rect x={anchorL.x - 70} y={anchorL.y - 50} width="100" height="28" rx="4"
              fill="#fef2f2" stroke="#ef4444" strokeWidth="1.5" />
            <text x={anchorL.x - 20} y={anchorL.y - 32} textAnchor="middle" fontSize="13" fill="#b91c1c" fontWeight="bold" fontFamily="monospace">
              T_L = {fmt(Math.max(0, data.T_L_kN), 2)} kN
            </text>
          </g>

          {/* 右錨點（▲ 三角形） */}
          <g onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setDrag('R'); }}
            className="cursor-grab active:cursor-grabbing">
            <circle cx={anchorR.x} cy={anchorR.y} r="22" fill="transparent" />
            <polygon points={`${anchorR.x - 14},${anchorR.y + 14} ${anchorR.x + 14},${anchorR.y + 14} ${anchorR.x},${anchorR.y - 14}`}
              fill="#cbd5e1" stroke="#1e293b" strokeWidth="2" />
            <rect x={anchorR.x - 18} y={anchorR.y + 14} width="36" height="6" fill="#475569" />
          </g>
          {/* 右錨點張力標籤 */}
          <g>
            <rect x={anchorR.x - 30} y={anchorR.y - 50} width="100" height="28" rx="4"
              fill="#fef2f2" stroke="#ef4444" strokeWidth="1.5" />
            <text x={anchorR.x + 20} y={anchorR.y - 32} textAnchor="middle" fontSize="13" fill="#b91c1c" fontWeight="bold" fontFamily="monospace">
              T_R = {fmt(Math.max(0, data.T_R_kN), 2)} kN
            </text>
          </g>

          {/* 負載（可拖曳） */}
          <g onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setDrag('W'); }}
            className="cursor-grab active:cursor-grabbing">
            <circle cx={loadPos.x} cy={loadPos.y} r="22" fill="transparent" />
            <circle cx={loadPos.x} cy={loadPos.y} r="12" fill="#ef4444" stroke="#ffffff" strokeWidth="3" />
            <text x={loadPos.x} y={loadPos.y + 4} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#ffffff">W</text>
          </g>

          {/* 圖例 */}
          <g transform={`translate(10, ${H - 60})`}>
            <rect x="0" y="0" width="180" height="50" rx="6"
              fill={cameraOn ? 'rgba(15,23,42,0.7)' : 'rgba(2,6,23,0.8)'}
              stroke="#475569" strokeWidth="1" />
            <text x="8" y="16" fontSize="11" fill="#cbd5e1" fontWeight="bold">圖例</text>
            <line x1="8" y1="26" x2="28" y2="26" stroke="#f59e0b" strokeWidth="3" />
            <text x="34" y="29" fontSize="10" fill="#cbd5e1">繩索</text>
            <line x1="70" y1="26" x2="90" y2="26" stroke="#ef4444" strokeWidth="3" />
            <text x="96" y="29" fontSize="10" fill="#cbd5e1">張力</text>
            <line x1="8" y1="40" x2="28" y2="40" stroke="#dc2626" strokeWidth="3" strokeDasharray="3 2" />
            <text x="34" y="43" fontSize="10" fill="#cbd5e1">重力 W</text>
            <line x1="92" y1="40" x2="112" y2="40" stroke="#c084fc" strokeWidth="2" />
            <text x="118" y="43" fontSize="10" fill="#cbd5e1">下垂角 θ</text>
          </g>
            </svg>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 3：墜落衝擊力 — 修 useEffect bug、加繩拉伸動畫、人體分級警告
// ========================================================================
function FallImpactModule() {
  const [mass, setMass] = useState(80);
  const [ropeLength, setRopeLength] = useState(10);
  const [fallDistance, setFallDistance] = useState(5);
  const [k_kgf, setK_kgf] = useState(4080);      // 繩索動態剛度（kgf）
  const k_kN = (k_kgf * G) / 1000;

  // FIX: 只依 ropeLength，使用 Math.min
  useEffect(() => {
    setFallDistance(prev => Math.min(prev, ropeLength * 2));
  }, [ropeLength]);

  const fallFactor = fallDistance / ropeLength;
  const mg_kN = (mass * G) / 1000;
  const impact_kN = mg_kN + Math.sqrt(mg_kN * mg_kN + 2 * k_kN * mg_kN * fallFactor);
  const human = evalHuman(impact_kN);

  // 觸發動畫的 key
  const [animKey, setAnimKey] = useState(0);
  const [showFlash, setShowFlash] = useState(false);
  useEffect(() => {
    setAnimKey(k => k + 1);
    setShowFlash(true);
    const t = setTimeout(() => setShowFlash(false), 500);
    return () => clearTimeout(t);
  }, [fallFactor, mass, k_kgf]);

  // 視覺定位
  const startY = fallFactor <= 1 ? 60 : 60 - (fallFactor - 1) * 30;
  const targetY = fallFactor <= 1 ? 100 + fallFactor * 50 : 150 + (fallFactor - 1) * 30;

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">3. 墜落衝擊力 — UIAA Fall Factor</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            墜落係數 FF = 墜落距離 / 有效繩長。最大 FF=2（先鋒墜落）。
            公式：<code className="text-blue-300 bg-slate-800 px-1 rounded">F = mg + √(mg² + 2·k·mg·FF)</code>
          </p>
          <p className="text-xs text-slate-500 mt-2">
            人體門檻：&lt;408 kgf 安全 · &lt;612 kgf UIAA 上限 · &lt;816 kgf OSHA · &lt;1224 kgf 重傷 · ≥1224 kgf 致命
          </p>
        </div>
        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="體重 (m)" value={mass} min={50} max={120} step={1} unit="kg" onChange={setMass} />
          <Slider label="有效繩長 (L)" value={ropeLength} min={1} max={50} step={1} unit="m" onChange={setRopeLength} />
          <Slider label="墜落距離 (h)" value={fallDistance} min={0.1} max={ropeLength * 2} step={0.1} unit="m" onChange={setFallDistance} />
          <Slider label="繩索動態剛度 k" value={k_kgf} min={2000} max={12000} step={100} unit="kgf" onChange={setK_kgf}
            hint="UIAA 動態繩典型 2500–4100 kgf · 靜力繩 8200–12200 kgf" />
        </div>
      </div>

      <div className="space-y-4 flex flex-col">
        <div className="grid grid-cols-2 gap-4">
          <NumberCard title="墜落係數 FF" value={fmt(fallFactor,2)} unit=""
            colorClass={fallFactor>=2 ? 'text-red-500 font-bold' : fallFactor>1 ? 'text-orange-400' : fallFactor>0.5 ? 'text-yellow-400' : 'text-green-400'} />
          <ForceCard title="衝擊力" kN={impact_kN}
            colorClass={human.color + (impact_kN > 6 ? ' pulse-red' : '')}
            description={impact_kN > 6 ? `⚠ ${human.label}（>612 kgf）` : human.label} accent={impact_kN > 8} />
        </div>
        <NfpaBadge force_kN={impact_kN} />

        <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-center p-4 relative overflow-hidden min-h-[260px]">
          {showFlash && impact_kN > 6 && (
            <div className="absolute inset-0 bg-red-500/30 flash-impact pointer-events-none" />
          )}
          <svg viewBox="0 0 200 280" className="w-full h-full max-h-64">
            <circle cx="100" cy="50" r="6" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" />
            <text x="110" y="55" fill="#94a3b8" fontSize="10">固定點</text>

            {/* 繩索：FF≤1 直墜，FF&gt;1 上方有起跌段 */}
            {fallFactor <= 1 ? (
              <line key={`r-${animKey}`} x1="100" y1="50" x2="100" y2={targetY}
                stroke="#f59e0b" strokeWidth="2.5">
                <animate attributeName="y2" from={startY} to={targetY} dur="0.5s" fill="freeze" />
                <animate attributeName="strokeWidth" values="2.5;4;2.5" dur="0.4s" begin="0.5s" />
              </line>
            ) : (
              <>
                <line x1="100" y1="50" x2="100" y2="20" stroke="#f59e0b" strokeWidth="2" strokeDasharray="3" />
                <text x="105" y="18" fill="#94a3b8" fontSize="10">起跌點</text>
                <path key={`r-${animKey}`} d={`M 100 50 Q 130 80 130 ${targetY}`}
                  fill="none" stroke="#f59e0b" strokeWidth="2.5">
                  <animate attributeName="d"
                    from={`M 100 50 Q 130 80 130 ${startY}`}
                    to={`M 100 50 Q 130 80 130 ${targetY}`}
                    dur="0.5s" fill="freeze" />
                </path>
              </>
            )}

            <circle key={`c-${animKey}`}
              cx={fallFactor <= 1 ? 100 : 130} cy={targetY} r="9"
              fill={impact_kN > 8 ? '#ef4444' : impact_kN > 6 ? '#f97316' : impact_kN > 4 ? '#eab308' : '#22c55e'}>
              <animate attributeName="cy"
                values={`${startY}; ${targetY+8}; ${targetY-2}; ${targetY}`}
                keyTimes="0; 0.7; 0.85; 1" dur="0.7s"
                calcMode="spline"
                keySplines="0.42 0 1 1; 0 0 0.58 1; 0 0 0.58 1"
                fill="freeze" />
            </circle>

            <text x="100" y="270" fill="#64748b" fontSize="9" textAnchor="middle">動態模擬：繩索拉伸 → 反彈</text>
          </svg>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 4：死亡三角 — 加力向量分解動畫
// ========================================================================
function DeathTriangleModule() {
  const [load_kgf, setLoad] = useState(100);
  const [angle, setAngle] = useState(60);

  const load_kN = (load_kgf * G) / 1000;
  const t = toRad(angle);
  // 標準 V 型：每邊 W / (2 cos(θ/2))
  const vRig_kN = load_kN / (2 * Math.cos(t / 2));
  // 死亡三角（封閉）：每邊承受向下分量 + 水平擠壓分量
  // 向量推導：每側張力 = sqrt( (W/(2cos))² + (W·sin/(2cos))² ... ) — 採用較教學版公式
  const dt_kN = load_kN * Math.sqrt(1 + Math.pow(Math.tan(t / 2), 2)) / (2 * Math.cos(t / 2));

  // SVG 動態
  const dy = 70;
  const dx = dy * Math.tan(t / 2);
  const midX = 150;
  const aL = midX - dx, aR = midX + dx;
  const minX = Math.min(0, aL - 30);
  const maxX = Math.max(300, aR + 30);
  const vBoxW = maxX - minX;

  return (
    <div className="space-y-6">
      <div className="grid md:grid-cols-2 gap-8">
        <div className="space-y-6">
          <div>
            <h2 className="text-2xl font-bold text-slate-100 mb-2">4. 死亡三角 — Death Triangle</h2>
            <p className="text-slate-400 text-sm leading-relaxed">
              扁帶連接兩個固定點且<strong className="text-red-400">未打結（封閉三角）</strong>時，
              水平方向的擠壓分量會放大固定點負載。安全做法：使用流動分力環或打孤狼結。
            </p>
          </div>
          <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
            <Slider label="載重 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
            <Slider label="夾角 (θ)" value={angle} min={10} max={160} step={5} unit="°" onChange={setAngle} />
          </div>
        </div>

        <div className="space-y-4 flex flex-col">
          <div className="grid grid-cols-2 gap-4">
            <ForceCard title="V 型 (單點張力)" kN={vRig_kN}
              colorClass={vRig_kN > load_kN ? 'text-yellow-400' : 'text-green-400'}
              description={`${fmt((vRig_kN/load_kN)*100,0)}% 載重`} />
            <ForceCard title="死亡三角 (合力)" kN={dt_kN} colorClass="text-red-500"
              description={`${fmt((dt_kN/load_kN)*100,0)}% 載重`} accent />
          </div>
          <NfpaBadge force_kN={dt_kN} />

          <div className="flex-1 grid grid-cols-2 gap-2">
            <div className="bg-slate-950 rounded-xl border border-slate-800 flex flex-col items-center p-3 overflow-hidden">
              <span className="text-xs text-green-400 mb-1 font-bold">✓ 標準 V 型架設</span>
              <svg viewBox={`${minX} 0 ${vBoxW} 170`} className="w-full h-full">
                <circle cx={aL} cy="40" r="4" fill="#cbd5e1" />
                <circle cx={aR} cy="40" r="4" fill="#cbd5e1" />
                <path d={`M ${aL} 40 L ${midX} 110 L ${aR} 40`} fill="none" stroke="#22c55e" strokeWidth="2.5" />
                <circle cx={midX} cy="110" r="6" fill="#3b82f6" />
                <line x1={midX} y1="110" x2={midX} y2="150" stroke="#ef4444" strokeWidth="3" />
                <text x={midX+8} y="148" fill="#ef4444" fontSize="11">{load_kgf}kgf</text>
                <line x1={aL} y1="40" x2={aL - 18} y2="22" stroke="#22c55e" strokeWidth="2" />
                <text x={aL - 50} y="18" fill="#22c55e" fontSize="11" fontWeight="bold">{fmt(kNtoKgf(vRig_kN),0)}</text>

            <line x1="160" y1="24" x2="150" y2="32" stroke="#475569" strokeWidth="1" />

            {/* 連接到變向點 */}

            <circle cx="120" cy="90" r="12" fill="#cbd5e1" stroke="#475569" strokeWidth="3" />
            <circle cx="120" cy="90" r="6" fill="#0f172a" />

            {(() => {
              const a = (angle / 2) * Math.PI / 180;
              const len = 110;
              const cx = 120, cy = 90;
              const x1 = cx - len * Math.sin(a), y1 = cy + len * Math.cos(a);

              return (<>
                {/* 兩條繩索（向下） */}

                <text x={x1} y={y1 + 24} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#ffffff">{tension_kgf}</text>
                <text x={x1} y={y1 + 36} textAnchor="middle" fontSize="8" fill="#cbd5e1">kgf</text>
                {/* 重力箭頭 */}
                <line x1={x1} y1={y1 + 44} x2={x1} y2={y1 + 60} stroke="#dc2626" strokeWidth="2" />

                  F = {fmt(kNtoKgf(anchor_kN), 0)} kgf
                </text>

                {/* 角度弧 */}
                {angle > 0 && (
                  <path d={`M ${cx - 28 * Math.sin(a)} ${cy + 28 * Math.cos(a)} A 28 28 0 0 0 ${cx + 28 * Math.sin(a)} ${cy + 28 * Math.cos(a)}`}
