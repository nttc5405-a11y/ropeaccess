// ========================================================================
// 模組 6：固定點與拉力夾角模擬器（保留拖曳，加無障礙與磁吸）
// ========================================================================
function capstanGain(mu, theta) { return Math.exp(mu * theta); }

function AnchorPullAngleModule() {
  // 畫布尺寸固定，不可調整
  const W = 780, H = 520;
  const massKg = 100;
  const T_L = (massKg * G) / 1000;

  // A（固定點）與 L（負載）位置鎖定 — 重力方向永遠向下
  const A = { x: W * 0.5, y: H * 0.30 };
  const L = { x: W * 0.5, y: H * 0.82 };   // L 永遠在 A 正下方
  const R_PULL = 200;                       // P 在以 A 為圓心、固定半徑的圓上移動

  // 拉力角度 α：從 A→L（向下）量起；正值 = P 在右側，負值 = P 在左側
  const [alphaDeg, setAlphaDeg] = useState(90);    // 預設 90°：P 水平向右
  const [mu, setMu] = useState(0.20);
  const [tight, setTight] = useState('P');
  const [dragging, setDragging] = useState(false);

  // P 由 α 推算（單位向量旋轉：A→L 為 (0,+1)，順時針旋轉 α 度）
  const alphaRad = toRad(alphaDeg);
  const P = {
    x: A.x + R_PULL * Math.sin(alphaRad),
    y: A.y + R_PULL * Math.cos(alphaRad),
  };

  // 拖曳 P：以滑鼠相對 A 的位置反推 α（限制 -180~180）
  const onMove = useCallback((e) => {
    if (!dragging) return;
    const rect = e.currentTarget.getBoundingClientRect();
    // 將像素座標還原到 viewBox 座標
    const sx = (e.clientX - rect.left) * (W / rect.width);
    const sy = (e.clientY - rect.top) * (H / rect.height);
    const dx = sx - A.x;
    const dy = sy - A.y;
    // 從 +y（向下）方向量起的順時針角度
    let ang = toDeg(Math.atan2(dx, dy));
    if (ang > 180) ang -= 360;
    if (ang < -180) ang += 360;
    setAlphaDeg(ang);
  }, [dragging]);

  // 力學計算
  const data = useMemo(() => {
    const absAlpha = Math.abs(alphaDeg);
    const theta = toRad(absAlpha);
    const gain = capstanGain(mu, theta);
    const T_P = tight === 'P' ? T_L * gain : T_L / gain;

    // 兩端張力沿 A→L、A→P 拉動 A 端
    const uAL = { x: 0, y: 1 };
    const uAP = { x: Math.sin(alphaRad), y: Math.cos(alphaRad) };
    const Rx = T_L * uAL.x + T_P * uAP.x;
    const Ry = T_L * uAL.y + T_P * uAP.y;
    const Rmag = Math.hypot(Rx, Ry);
    return { absAlpha, gain, T_P, Rmag, Rx, Ry };
  }, [alphaDeg, mu, tight, T_L, alphaRad]);

  // 固定常用角度按鈕
  const presetAngles = [0, 30, 45, 60, 90, 120, 150, 180];

  return (
    <div className="bg-slate-50 text-slate-900 rounded-xl overflow-hidden shadow-inner">
      <div className="p-4 md:p-6">
        <h2 className="text-2xl font-bold text-slate-800 mb-2">6. 固定點與拉力夾角模擬器</h2>
        <p className="text-slate-500 text-sm mb-4">
          負載 <b>L</b> 永遠在固定點 <b>A</b> 正下方（重力方向）。<b>拖曳藍色拉力點 P</b> 改變夾角 α，或用下方滑桿調整。
        </p>

        <div className="mb-4 grid grid-cols-2 md:grid-cols-4 gap-3">
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-1">摩擦係數 μ</div>
            <input type="range" min="0" max="0.6" step="0.01" value={mu}
              onChange={(e) => setMu(parseFloat(e.target.value))} className="w-full accent-blue-500"
              aria-label="摩擦係數" />
            <div className="text-sm font-mono">μ = {mu.toFixed(2)}</div>
          </div>
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-1">夾角 α</div>
            <input type="range" min="-180" max="180" step="1" value={alphaDeg}
              onChange={(e) => setAlphaDeg(parseFloat(e.target.value))} className="w-full accent-orange-500"
              aria-label="夾角" />
            <div className="text-lg font-mono text-orange-600">{data.absAlpha.toFixed(1)}°
              <span className="text-xs text-slate-400 ml-1">{alphaDeg >= 0 ? '右' : '左'}</span>
            </div>
          </div>
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-1">合力 R（A 端承受）</div>
            <div className="text-2xl font-mono text-red-600">{fmt(kNtoKgf(data.Rmag), 0)} <span className="text-sm">kgf</span></div>
          </div>
          <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
            <div className="text-xs font-bold text-slate-400 uppercase mb-2">緊邊 (Capstan)</div>
            <div className="flex gap-1">
              <button onClick={() => setTight('P')}
                className={`flex-1 px-2 py-1 rounded text-xs font-medium ${tight==='P' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>P 緊邊</button>
              <button onClick={() => setTight('L')}
                className={`flex-1 px-2 py-1 rounded text-xs font-medium ${tight==='L' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>L 緊邊</button>
            </div>
            <div className="text-[10px] text-slate-500 mt-1">e^μθ 增益 = {fmt(data.gain,2)}</div>
          </div>
        </div>

        {/* 預設角度快捷鈕 */}
        <div className="mb-3 flex flex-wrap gap-1.5">
          <span className="text-xs text-slate-500 self-center mr-1">快速角度：</span>
          {presetAngles.map(a => (
            <button key={a} onClick={() => setAlphaDeg(alphaDeg < 0 ? -a : a)}
              className={`px-2 py-1 text-xs rounded ${data.absAlpha === a ? 'bg-orange-500 text-white' : 'bg-white border border-slate-300 hover:bg-slate-100'}`}>
              {a}°
            </button>
          ))}
          <button onClick={() => setAlphaDeg(-alphaDeg)}
            className="px-2 py-1 text-xs rounded bg-slate-100 border border-slate-300 hover:bg-slate-200">↔ 鏡像</button>
        </div>

        {/* 畫布：尺寸固定 */}
        <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
          <svg viewBox={`0 0 ${W} ${H}`}
            className="w-full select-none touch-none bg-white"
            style={{ aspectRatio: `${W} / ${H}` }}
            onPointerMove={onMove}
            onPointerUp={() => setDragging(false)}
            onPointerLeave={() => setDragging(false)}>

            {/* 格線 */}
            {[...Array(Math.ceil(W/40)+1)].map((_,i)=><line key={`v${i}`} x1={i*40} y1={0} x2={i*40} y2={H} stroke="#f1f5f9" />)}
            {[...Array(Math.ceil(H/40)+1)].map((_,i)=><line key={`h${i}`} x1={0} y1={i*40} x2={W} y2={i*40} stroke="#f1f5f9" />)}

            {/* 重力參考線（A 正下方虛線） */}
            <line x1={A.x} y1={A.y} x2={A.x} y2={H} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4 6" />
            <text x={A.x + 8} y={A.y + 80} fontSize="11" fill="#94a3b8">重力方向 ↓</text>

            {/* P 可拖曳的軌跡圓 */}
            <circle cx={A.x} cy={A.y} r={R_PULL} fill="none" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="2 4" />

            {/* 角度弧（弧線本身在底層） */}
            {(() => {
              const r = 50;
              const sx = A.x + r * Math.sin(0);
              const sy = A.y + r * Math.cos(0);
              const ex = A.x + r * Math.sin(alphaRad);
              const ey = A.y + r * Math.cos(alphaRad);
              const sweep = alphaDeg >= 0 ? 1 : 0;
              const large = Math.abs(alphaDeg) > 180 ? 1 : 0;
              return (
                <path d={`M ${sx} ${sy} A ${r} ${r} 0 ${large} ${sweep} ${ex} ${ey}`}
                  fill="none" stroke="#f97316" strokeWidth="2.5" />
              );
            })()}

            {/* L 端繩索（A→L） */}
            <line x1={A.x} y1={A.y} x2={L.x} y2={L.y} stroke="#0ea5e9" strokeWidth="3" />
            <text x={A.x + 6} y={(A.y + L.y) / 2} fontSize="12" fill="#0ea5e9" fontWeight="bold">
              T_L = {fmt(kNtoKgf(T_L), 0)} kgf
            </text>

            {/* P 端繩索（A→P） */}
            <line x1={A.x} y1={A.y} x2={P.x} y2={P.y} stroke="#0ea5e9" strokeWidth="3" />
            <text x={(A.x + P.x) / 2 + (alphaDeg >= 0 ? 8 : -90)} y={(A.y + P.y) / 2 - 6}
              fontSize="12" fill="#0ea5e9" fontWeight="bold">
              T_P = {fmt(kNtoKgf(data.T_P), 0)} kgf
            </text>

            {/* 合力箭頭 R（A 端承受的合力） */}
            {(() => {
              const Rlen = Math.hypot(data.Rx, data.Ry) || 1;
              const k = Math.min(140, data.Rmag * 70);
              const tipX = A.x + (data.Rx / Rlen) * k;
              const tipY = A.y + (data.Ry / Rlen) * k;
              const ang = toDeg(Math.atan2(data.Ry, data.Rx));
              return (
                <g>
                  <line x1={A.x} y1={A.y} x2={tipX} y2={tipY} stroke="#ef4444" strokeWidth="5" />
                  <polygon points={`0,-7 14,0 0,7`} fill="#ef4444"
                    transform={`translate(${tipX},${tipY}) rotate(${ang})`} />
                  <rect x={tipX + 12} y={tipY - 14} rx="4" width="130" height="26" fill="#fef2f2" stroke="#ef4444" />
                  <text x={tipX + 18} y={tipY + 4} fontSize="13" fill="#b91c1c" fontWeight="bold" fontFamily="monospace">
                    R = {fmt(kNtoKgf(data.Rmag), 0)} kgf
                  </text>
                </g>
              );
            })()}

            {/* 角度文字（最上層，覆蓋於紅色箭頭之上） */}
            {(() => {
              const r = 50;
              const labelX = A.x + (r + 22) * Math.sin(alphaRad / 2);
              const labelY = A.y + (r + 22) * Math.cos(alphaRad / 2) + 5;
              const labelText = `α = ${data.absAlpha.toFixed(1)}°`;
              const w = 90, h = 24;
              return (
                <g>
                  <rect x={labelX - w / 2} y={labelY - h / 2 - 4} width={w} height={h} rx="6"
                    fill="#ffffff" fillOpacity="0.95" stroke="#f97316" strokeWidth="1.5" />
                  <text x={labelX} y={labelY + 3} textAnchor="middle"
                    fontSize="14" fill="#f97316" fontWeight="bold">
                    {labelText}
                  </text>
                </g>
              );
            })()}

            {/* 固定點 A（不可拖曳，僅以小圓點標示） */}
            <g>
              <circle cx={A.x} cy={A.y} r="4" fill="#1f2937" />
              <text x={A.x + 10} y={A.y - 8} fontSize="11" fill="#475569" fontWeight="bold">A（固定點）</text>
            </g>

            {/* P 拉力（可拖曳） */}
            <g
              onPointerDown={(e) => {
                e.target.setPointerCapture(e.pointerId);
                setDragging(true);
              }}
              className="cursor-grab active:cursor-grabbing">
              {/* 加大透明點擊區 */}
              <circle cx={P.x} cy={P.y} r="28" fill="transparent" />
              <circle cx={P.x} cy={P.y} r="16" fill="#0ea5e9" stroke="#ffffff" strokeWidth="3" />
              <text x={P.x} y={P.y + 4} textAnchor="middle" fontSize="12" fontWeight="bold" fill="#ffffff">P</text>
              <text x={P.x + 20} y={P.y - 14} fontSize="11" fill="#0369a1" fontWeight="bold">↻ 拖曳我</text>
            </g>

            {/* L 負載（不可拖曳，永遠在下方） */}
            <g>
              <line x1={A.x} y1={A.y} x2={L.x} y2={L.y - 22} stroke="#0ea5e9" strokeWidth="3" />
              <rect x={L.x - 26} y={L.y - 22} width="52" height="44" rx="6" fill="#64748b" stroke="#334155" strokeWidth="2" />
              <text x={L.x} y={L.y + 2} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#ffffff">100 kg</text>
              <text x={L.x} y={L.y + 14} textAnchor="middle" fontSize="9" fill="#cbd5e1">負載 L</text>
              {/* 重力箭頭 */}
              <line x1={L.x} y1={L.y + 26} x2={L.x} y2={L.y + 60} stroke="#dc2626" strokeWidth="3" />
              <polygon points={`${L.x - 6},${L.y + 56} ${L.x + 6},${L.y + 56} ${L.x},${L.y + 66}`} fill="#dc2626" />
              <text x={L.x + 12} y={L.y + 54} fontSize="11" fill="#dc2626" fontWeight="bold">g</text>
            </g>
          </svg>
        </div>

        <div className="mt-3 grid md:grid-cols-2 gap-3 text-xs">
          <div className="bg-white border border-slate-200 rounded p-3">
            <div className="font-bold text-slate-700 mb-1">力學說明</div>
            <div className="text-slate-600 leading-relaxed">
              T_L 為負載重力（恆定 {fmt(kNtoKgf(T_L), 0)} kgf）。T_P 為操作端拉力，依 Capstan
              方程 e^(μθ) 修正（緊邊 = {tight}）。固定點 A 承受兩端張力的向量和 R。
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded p-3">
            <div className="font-bold text-slate-700 mb-1">操作提示</div>
            <ul className="text-slate-600 list-disc pl-4 space-y-0.5">
              <li>α = 0°：P 與 L 同方向 → A 承受 2 倍張力（U 形迴轉）</li>
              <li>α = 180°：P 與 L 反向 → 兩端力相減，A 接近零負荷</li>
              <li>固定點 A 與負載 L 已鎖定，僅 P 可移動</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 7（新增）：機械倍力系統 MA System
// ========================================================================
function MAModule() {
  const [load_kgf, setLoad] = useState(100);
  const [ratio, setRatio] = useState(3);          // 1, 2, 3, 4, 5, 6, 7, 9
  const [efficiency, setEfficiency] = useState(0.9); // 滑輪效率（每段）

  // 理論輸入力 = 載重 / 倍率
  const load_kN = (load_kgf * G) / 1000;
  const idealInput_kN = load_kN / ratio;
  // 實際 = 理論 / 累積效率（簡化模型：每多一段乘上效率）
  const realRatio = (1 - Math.pow(efficiency, ratio)) / (1 - efficiency); // 級數和近似
  const realInput_kN = load_kN / realRatio;
  const lossPct = ((realInput_kN - idealInput_kN) / idealInput_kN) * 100;

  const presets = [
    { name: '1:1 直拉', ratio: 1 },
    { name: '2:1 滑輪', ratio: 2 },
    { name: '3:1 Z-rig', ratio: 3 },
    { name: '4:1', ratio: 4 },
    { name: '5:1 Compound', ratio: 5 },
    { name: '6:1', ratio: 6 },
    { name: '7:1', ratio: 7 },
    { name: '9:1', ratio: 9 },
  ];

  return (
    <div className="grid md:grid-cols-2 gap-8">
      <div className="space-y-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-100 mb-2">7. 機械倍力系統 — Mechanical Advantage</h2>
          <p className="text-slate-400 text-sm leading-relaxed">
            倍力系統可大幅減少救援者出力，但每個滑輪都會損失 5–15%。
            公式（級數）：<code className="text-blue-300 bg-slate-800 px-1 rounded">η_total = (1−η^n) / (1−η)</code>
          </p>
        </div>

        <div className="space-y-4 bg-slate-800/50 p-5 rounded-xl">
          <Slider label="負載 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
          <div>
            <div className="text-sm font-medium text-slate-300 mb-2">倍率</div>
            <div className="grid grid-cols-4 gap-2">
              {presets.map(p => (
                <button key={p.ratio} onClick={() => setRatio(p.ratio)}
                  className={`px-2 py-1.5 rounded text-xs font-medium transition-colors ${
                    ratio === p.ratio ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                  {p.name}
                </button>
              ))}
            </div>
          </div>
          <Slider label="滑輪效率 η" value={efficiency} min={0.7} max={1.0} step={0.01} unit="" onChange={setEfficiency}
            hint="高品質球軸承 0.95 · 一般滑輪 0.90 · 鉤環變向 0.70" />
        </div>
      </div>

      <div className="space-y-4 flex flex-col">
        <div className="grid grid-cols-2 gap-4">
          <ForceCard title="理論輸入力" kN={idealInput_kN} colorClass="text-green-400" description={`載重 ÷ ${ratio}`} />
          <ForceCard title="實際輸入力" kN={realInput_kN} colorClass="text-yellow-400" description={`效率損失 ${fmt(lossPct,0)}%`} />
        </div>
        <NumberCard title="實效倍率" value={fmt(realRatio,2)} unit=":1" colorClass="text-blue-400"
          description={`理論 ${ratio}:1 · 損失 ${fmt(lossPct,0)}%`} />
        <NfpaBadge force_kN={load_kN * (ratio === 1 ? 1 : 1.2)} />
        <div className="flex-1 bg-slate-950 rounded-xl border border-slate-800 p-4 text-xs text-slate-400 space-y-1">
          <div className="text-slate-200 font-bold mb-2">救援操作備註：</div>
          <div>• Whistle Test：放手時系統會否危險？倍力系統需配備制動器（Prusik / 抓結）</div>
          <div>• Critical Point：分析全系統最弱環節，依 NFPA SWL 預估</div>
          <div>• 倍率越高 → 效率損失越大、繩索消耗越快、救援距離越短</div>
          <div>• 高倍率（5:1+）建議用 Compound 系統而非單純 Simple</div>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 模組 8（新）：高轉折點受力分析（下方錨點 → 高處轉折 → 操作端）
// 樹枝、鉤環、滑輪等都適用
// ========================================================================
function RedirectAnalysisModule() {
  const W = 800, H = 480;

  // 三個可拖曳點：下方錨點 A、高處轉折點 R、操作端 O
  const [anchor, setAnchor] = useState({ x: W * 0.20, y: H * 0.78 });
  const [redirect, setRedirect] = useState({ x: W * 0.50, y: H * 0.18 });
  const [operator, setOperator] = useState({ x: W * 0.80, y: H * 0.78 });

  const [load_kgf, setLoad] = useState(100);
  const [mu, setMu] = useState(0.20);
  const [tight, setTight] = useState('A');     // 緊邊：A=載重端（垂降）、O=操作端（拉升）
  const [pulleyType, setPulleyType] = useState('carabiner'); // 'tree' | 'carabiner' | 'pulley'

  // 相機 / 格線 / 全螢幕 / 截圖
  const [cameraOn, setCameraOn] = useState(false);
  const [showGrid, setShowGrid] = useState(true);
  const [fullscreen, setFullscreen] = useState(false);
  const [cameraError, setCameraError] = useState('');
  const [shotMsg, setShotMsg] = useState('');
  const videoRef = useRef(null);
  const svgRef = useRef(null);
  const [drag, setDrag] = useState(null);

  const load_kN = (load_kgf * G) / 1000;

  // 滑輪/鉤環效率（影響等效摩擦）
  const muEff = pulleyType === 'pulley' ? Math.max(0.05, mu * 0.3)   // 滑輪低摩擦
              : pulleyType === 'tree'    ? Math.min(0.8, mu * 1.8)   // 樹幹高摩擦
              : mu;                                                    // 鉤環

  // 啟動相機
  useEffect(() => {
    let stream = null;
    if (cameraOn) {
      navigator.mediaDevices?.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => { stream = s; if (videoRef.current) videoRef.current.srcObject = s; setCameraError(''); })
        .catch(err => { setCameraError('無法存取相機：' + (err.message || err.name) + '（需 HTTPS 或 localhost）'); setCameraOn(false); });
    }
    return () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (videoRef.current) videoRef.current.srcObject = null;
    };
  }, [cameraOn]);

  const takeScreenshot = useCallback(async () => {
    const ok = await captureSVGWithVideo(svgRef.current, videoRef.current, W, H,
      `redirect_${Date.now()}.png`);
    setShotMsg(ok ? '✓ 截圖已儲存' : '✗ 截圖失敗');
    setTimeout(() => setShotMsg(''), 2000);
  }, []);

  // 力學計算（在 R 點分析）
  const data = useMemo(() => {
    const dxRA = anchor.x - redirect.x, dyRA = anchor.y - redirect.y;
    const dxRO = operator.x - redirect.x, dyRO = operator.y - redirect.y;
    const lenRA = Math.hypot(dxRA, dyRA) || 1;
    const lenRO = Math.hypot(dxRO, dyRO) || 1;
    const uRA = { x: dxRA / lenRA, y: dyRA / lenRA };
    const uRO = { x: dxRO / lenRO, y: dyRO / lenRO };

    // 包覆角 θ = R 點兩繩段之間的夾角
    const cosT = clamp(uRA.x * uRO.x + uRA.y * uRO.y, -1, 1);
    const theta = Math.acos(cosT);
    const angleDeg = toDeg(theta);

    // Capstan 摩擦 e^(μθ)
    const gain = Math.exp(muEff * theta);

    // 張力：A 端為載重端 = load_kN
    const T_A_kN = load_kN;
    // 操作端 = 載重 / e^μθ（垂降，緊邊在 A）或載重 × e^μθ（拉升，緊邊在 O）
    const T_O_kN = tight === 'A' ? load_kN / gain : load_kN * gain;

    // R 點承受合力（兩繩拉動 R 朝向 A 與 O）
    const Rx = T_A_kN * uRA.x + T_O_kN * uRO.x;
    const Ry = T_A_kN * uRA.y + T_O_kN * uRO.y;
    const Rmag = Math.hypot(Rx, Ry);

    // 警告：若 R 比 A 還低，違反「上方轉折」假設
    const redirectAboveAnchor = redirect.y < anchor.y;
    const redirectAboveOperator = redirect.y < operator.y;

    return {
      angleDeg, theta, gain, T_A_kN, T_O_kN, Rmag, Rx, Ry,
      uRA, uRO, redirectAboveAnchor, redirectAboveOperator,
    };
  }, [anchor, redirect, operator, load_kN, muEff, tight]);

  const onMove = useCallback((e) => {
    if (!drag) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const sx = clamp((e.clientX - rect.left) * (W / rect.width), 16, W - 16);
    const sy = clamp((e.clientY - rect.top) * (H / rect.height), 16, H - 16);
    if (drag === 'A') setAnchor({ x: sx, y: sy });
    if (drag === 'R') setRedirect({ x: sx, y: sy });
    if (drag === 'O') setOperator({ x: sx, y: sy });
  }, [drag]);

  const GRID = 40;
  const geometryWarn = !data.redirectAboveAnchor || !data.redirectAboveOperator;

  return (
    <div className="space-y-4">
      <div className="grid md:grid-cols-2 gap-8">
        <div className="space-y-4">
          <div>
            <h2 className="text-2xl font-bold text-slate-100 mb-2">8. 高轉折點受力分析</h2>
            <p className="text-slate-400 text-sm leading-relaxed">
              下方錨點（負載／受困者）的繩索向上經過<strong className="text-green-300">高轉折點</strong>
              （樹幹／鉤環／滑輪）後再下到操作端。轉折點承受兩繩的向量合力。
              <br/>公式：<code className="text-blue-300 bg-slate-800 px-1 rounded">R = T_A·û_A + T_O·û_O</code>
              <br/>含 Capstan 摩擦：<code className="text-blue-300 bg-slate-800 px-1 rounded">T_緊 = T_鬆 × e^(μθ)</code>
            </p>
          </div>
          <div className="space-y-3 bg-slate-800/50 p-4 rounded-xl">
            <Slider label="負載 (W)" value={load_kgf} min={50} max={500} step={10} unit="kgf" onChange={setLoad} />
            <Slider label="摩擦係數 μ（基準）" value={mu} min={0} max={0.8} step={0.05} unit="" onChange={setMu}
              hint="鉤環 0.2 · 樹幹 0.4 · 粗糙岩 0.6（依轉折物自動修正）" />
            <div>
              <div className="text-sm font-medium text-slate-300 mb-1.5">轉折物類型</div>
              <div className="grid grid-cols-3 gap-1.5">
                <button onClick={() => setPulleyType('tree')}
                  className={`px-2 py-1.5 rounded text-xs ${pulleyType==='tree' ? 'bg-amber-700 text-white' : 'bg-slate-700 text-slate-300'}`}>
                  🌳 樹幹（×1.8）
                </button>
                <button onClick={() => setPulleyType('carabiner')}
                  className={`px-2 py-1.5 rounded text-xs ${pulleyType==='carabiner' ? 'bg-blue-700 text-white' : 'bg-slate-700 text-slate-300'}`}>
                  ⛓ 鉤環（×1.0）
                </button>
                <button onClick={() => setPulleyType('pulley')}
                  className={`px-2 py-1.5 rounded text-xs ${pulleyType==='pulley' ? 'bg-emerald-700 text-white' : 'bg-slate-700 text-slate-300'}`}>
                  ⚙ 滑輪（×0.3）
                </button>
              </div>
              <div className="text-[10px] text-slate-500 mt-1">有效 μ_eff = {fmt(muEff, 2)}</div>
            </div>
            <div>
              <div className="text-sm font-medium text-slate-300 mb-1.5">操作模式（緊邊）</div>
              <div className="grid grid-cols-2 gap-1.5">
                <button onClick={() => setTight('A')}
                  className={`px-2 py-1.5 rounded text-xs ${tight==='A' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`}>
                  ⬇ 垂降（A 端緊）
                </button>
                <button onClick={() => setTight('O')}
                  className={`px-2 py-1.5 rounded text-xs ${tight==='O' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`}>
                  ⬆ 拉升（O 端緊）
                </button>
              </div>
            </div>
            <div className="flex flex-wrap gap-2 text-xs pt-1">
              <button onClick={() => setCameraOn(!cameraOn)}
                className={`px-3 py-1.5 rounded font-medium ${cameraOn ? 'bg-red-600 hover:bg-red-700 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-200'}`}>
                {cameraOn ? '⏹ 停止相機' : '📷 啟用相機 AR'}
              </button>
              <label className="flex items-center gap-1.5 px-3 py-1.5 rounded bg-slate-700 text-slate-200 cursor-pointer">
                <input type="checkbox" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} />格線
              </label>
              <button onClick={() => setFullscreen(true)}
                className="px-3 py-1.5 rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium">
                🖥 放大畫布
              </button>
              <button onClick={takeScreenshot}
                className="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium">
                📸 截圖
              </button>
              <button onClick={() => {
                setAnchor({ x: W * 0.20, y: H * 0.78 });
                setRedirect({ x: W * 0.50, y: H * 0.18 });
                setOperator({ x: W * 0.80, y: H * 0.78 });
              }} className="px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-200">重置</button>
              {shotMsg && <span className="self-center text-emerald-400 font-medium">{shotMsg}</span>}
            </div>
            {cameraError && (
              <div className="text-xs text-red-400 bg-red-950/40 border border-red-800 rounded p-2">{cameraError}</div>
            )}
          </div>
        </div>

        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <ForceCard title="負載端張力 T_A" kN={data.T_A_kN}
              colorClass="text-amber-400"
              description="下方錨點 → 轉折點" />
            <ForceCard title="操作端張力 T_O" kN={data.T_O_kN}
              colorClass={data.T_O_kN < data.T_A_kN ? 'text-green-400' : 'text-red-400'}
              description={tight === 'A' ? `↓ 比 T_A 少 ${fmt((1 - data.T_O_kN/data.T_A_kN)*100, 0)}%` : `↑ 比 T_A 多 ${fmt((data.T_O_kN/data.T_A_kN - 1)*100, 0)}%`} />
          </div>
          <ForceCard title="🌳 轉折點承受合力 R" kN={data.Rmag}
            colorClass={data.Rmag > load_kN * 1.8 ? 'text-red-500' : 'text-orange-400'}
            description={`為負載的 ${fmt(data.Rmag / load_kN, 2)} 倍 · 包覆角 θ = ${fmt(data.angleDeg, 0)}°`}
            accent={data.Rmag > load_kN * 1.8} />
          <NfpaBadge force_kN={data.Rmag} />
          {geometryWarn && (
            <div className="bg-orange-950/40 border border-orange-800 rounded p-2 text-xs text-orange-300">
              ⚠ 轉折點 R 應在錨點 A 與操作端 O 上方才符合「高轉折」情境
            </div>
          )}
        </div>
      </div>

      {/* 互動畫布（含全螢幕模式） */}
      <div className={fullscreen
        ? 'fixed inset-0 z-50 bg-slate-950 flex flex-col'
        : 'relative bg-slate-950 rounded-xl border border-slate-800 overflow-hidden'}>
        {fullscreen && (
          <div className="bg-slate-900/90 backdrop-blur px-3 py-2 flex justify-between items-center gap-2 border-b border-slate-700">
            <span className="text-slate-200 font-bold text-sm">高轉折點受力分析 — 全螢幕模式</span>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => setCameraOn(!cameraOn)}
                className={`px-3 py-1.5 rounded text-xs font-medium ${cameraOn ? 'bg-red-600 text-white' : 'bg-slate-700 text-slate-200'}`}>
                {cameraOn ? '⏹ 相機' : '📷 相機'}
              </button>
              <label className="flex items-center gap-1 px-3 py-1.5 rounded bg-slate-700 text-slate-200 text-xs cursor-pointer">
                <input type="checkbox" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} />格線
              </label>
              <button onClick={takeScreenshot}
                className="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium">📸 截圖</button>
              <button onClick={() => setFullscreen(false)}
                className="px-3 py-1.5 rounded bg-slate-600 hover:bg-slate-500 text-white text-xs font-medium">⏏ 退出</button>
              {shotMsg && <span className="self-center text-emerald-400 text-xs">{shotMsg}</span>}
            </div>
          </div>
        )}

        <div className={fullscreen ? 'flex-1 flex items-center justify-center overflow-hidden' : 'relative'}>
          <div className={fullscreen ? 'relative max-w-full max-h-full' : 'relative w-full'}
            style={{ aspectRatio: `${W} / ${H}`, ...(fullscreen ? { width: 'min(100%, calc(100vh * 800 / 480))' } : {}) }}>
            {cameraOn && (
              <video ref={videoRef} autoPlay playsInline muted
                className="absolute inset-0 w-full h-full object-cover" />
            )}

            <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
              className="absolute inset-0 w-full h-full select-none touch-none z-10"
              preserveAspectRatio="xMidYMid meet"
              onPointerMove={onMove}
              onPointerUp={() => setDrag(null)}
              onPointerLeave={() => setDrag(null)}>

              {/* 格線 */}
              {showGrid && (
                <g opacity={cameraOn ? 0.5 : 1}>
                  {Array.from({ length: Math.ceil(W / GRID) + 1 }, (_, i) => (
                    <line key={`gv${i}`} x1={i * GRID} y1={0} x2={i * GRID} y2={H}
                      stroke={cameraOn ? '#22d3ee' : '#1e293b'} strokeWidth={i % 5 === 0 ? 1.2 : 0.5}
                      strokeDasharray={i % 5 === 0 ? 'none' : '2 4'} />
                  ))}
                  {Array.from({ length: Math.ceil(H / GRID) + 1 }, (_, i) => (
                    <line key={`gh${i}`} x1={0} y1={i * GRID} x2={W} y2={i * GRID}
                      stroke={cameraOn ? '#22d3ee' : '#1e293b'} strokeWidth={i % 5 === 0 ? 1.2 : 0.5}
                      strokeDasharray={i % 5 === 0 ? 'none' : '2 4'} />
                  ))}
                  <line x1={W/2 - 12} y1={H/2} x2={W/2 + 12} y2={H/2} stroke="#fbbf24" strokeWidth="1.5" />
                  <line x1={W/2} y1={H/2 - 12} x2={W/2} y2={H/2 + 12} stroke="#fbbf24" strokeWidth="1.5" />
                </g>
              )}

              {/* 繩索：A → R → O */}
              <line x1={anchor.x} y1={anchor.y} x2={redirect.x} y2={redirect.y}
                stroke="#f59e0b" strokeWidth="3.5" />
              <line x1={redirect.x} y1={redirect.y} x2={operator.x} y2={operator.y}
                stroke="#f59e0b" strokeWidth="3.5" />

              {/* 包覆角 θ 弧 */}
              {(() => {
                const r = 38;
                const ang1 = Math.atan2(data.uRA.y, data.uRA.x);
                const ang2 = Math.atan2(data.uRO.y, data.uRO.x);
                let delta = ang2 - ang1;
                while (delta > Math.PI) delta -= 2 * Math.PI;
                while (delta < -Math.PI) delta += 2 * Math.PI;
                const sweep = delta > 0 ? 1 : 0;
                const sx = redirect.x + r * Math.cos(ang1);
                const sy = redirect.y + r * Math.sin(ang1);
                const ex = redirect.x + r * Math.cos(ang2);
                const ey = redirect.y + r * Math.sin(ang2);
                return (
                  <path d={`M ${sx} ${sy} A ${r} ${r} 0 0 ${sweep} ${ex} ${ey}`}
                    fill="none" stroke="#c084fc" strokeWidth="2.5" />
                );
              })()}

              {/* 沿繩索張力標籤 */}
              <g>
                <rect x={(anchor.x + redirect.x) / 2 - 60} y={(anchor.y + redirect.y) / 2 - 12}
                  width="120" height="22" rx="4" fill="#451a03" stroke="#f59e0b" opacity="0.92" />
                <text x={(anchor.x + redirect.x) / 2} y={(anchor.y + redirect.y) / 2 + 3}
                  textAnchor="middle" fontSize="12" fill="#fbbf24" fontWeight="bold" fontFamily="monospace">
                  T_A = {fmt(kNtoKgf(data.T_A_kN), 0)} kgf
                </text>
                <rect x={(redirect.x + operator.x) / 2 - 60} y={(redirect.y + operator.y) / 2 - 12}
                  width="120" height="22" rx="4" fill="#451a03" stroke="#f59e0b" opacity="0.92" />
                <text x={(redirect.x + operator.x) / 2} y={(redirect.y + operator.y) / 2 + 3}
                  textAnchor="middle" fontSize="12" fill="#fbbf24" fontWeight="bold" fontFamily="monospace">
                  T_O = {fmt(kNtoKgf(data.T_O_kN), 0)} kgf
                </text>
              </g>

              {/* R 點承受合力箭頭 */}
              {(() => {
                const Rlen = Math.hypot(data.Rx, data.Ry) || 1;
                const k = Math.min(120, data.Rmag * 50);
                const tipX = redirect.x + (data.Rx / Rlen) * k;
                const tipY = redirect.y + (data.Ry / Rlen) * k;
                const ang = toDeg(Math.atan2(data.Ry, data.Rx));
                return (
                  <g>
                    <line x1={redirect.x} y1={redirect.y} x2={tipX} y2={tipY} stroke="#ef4444" strokeWidth="5" />
                    <polygon points="0,-7 14,0 0,7" fill="#ef4444"
                      transform={`translate(${tipX},${tipY}) rotate(${ang})`} />
                    <rect x={tipX + 12} y={tipY - 14} width="160" height="26" rx="4"
                      fill="#fef2f2" stroke="#ef4444" strokeWidth="1.5" />
                    <text x={tipX + 18} y={tipY + 4} fontSize="13" fill="#b91c1c" fontWeight="bold" fontFamily="monospace">
                      R = {fmt(kNtoKgf(data.Rmag), 0)} kgf
                    </text>
                  </g>
                );
              })()}

              {/* 角度標籤（最上層） */}
              {(() => {
                const r = 38;
                const ang1 = Math.atan2(data.uRA.y, data.uRA.x);
                const ang2 = Math.atan2(data.uRO.y, data.uRO.x);
                let delta = ang2 - ang1;
                while (delta > Math.PI) delta -= 2 * Math.PI;
                while (delta < -Math.PI) delta += 2 * Math.PI;
                const midAng = ang1 + delta / 2;
                const labelX = redirect.x + (r + 32) * Math.cos(midAng);
                const labelY = redirect.y + (r + 32) * Math.sin(midAng);
                return (
                  <g>
                    <rect x={labelX - 38} y={labelY - 12} width="76" height="22" rx="4"
                      fill="#1e1b4b" stroke="#c084fc" strokeWidth="1.5" opacity="0.95" />
                    <text x={labelX} y={labelY + 4} textAnchor="middle"
                      fontSize="13" fill="#c084fc" fontWeight="bold">
                      θ = {fmt(data.angleDeg, 0)}°
                    </text>
                  </g>
                );
              })()}

              {/* 下方錨點 A（藍色方塊） */}
              <g onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setDrag('A'); }}
                className="cursor-grab active:cursor-grabbing">
                <circle cx={anchor.x} cy={anchor.y} r="22" fill="transparent" />
                <rect x={anchor.x - 16} y={anchor.y - 16} width="32" height="32" rx="3"
                  fill="#3b82f6" stroke="#1e3a8a" strokeWidth="2" />
                <text x={anchor.x} y={anchor.y + 5} textAnchor="middle" fontSize="12" fontWeight="bold" fill="#fff">A</text>
                <rect x={anchor.x - 50} y={anchor.y + 22} width="100" height="22" rx="3"
                  fill="#1e3a8a" stroke="#fff" strokeWidth="1" />
                <text x={anchor.x} y={anchor.y + 37} textAnchor="middle" fontSize="11" fill="#fff" fontFamily="monospace" fontWeight="bold">
                  載重 {load_kgf} kgf
                </text>
              </g>

              {/* 高轉折點 R（依類型顯示不同圖示） */}
              <g onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setDrag('R'); }}
                className="cursor-grab active:cursor-grabbing">
                <circle cx={redirect.x} cy={redirect.y} r="26" fill="transparent" />
                {pulleyType === 'tree' && (
                  <g>
                    <ellipse cx={redirect.x} cy={redirect.y - 18} rx="20" ry="14" fill="#15803d" />
                    <ellipse cx={redirect.x - 10} cy={redirect.y - 22} rx="14" ry="10" fill="#16a34a" />
                    <ellipse cx={redirect.x + 10} cy={redirect.y - 22} rx="14" ry="10" fill="#16a34a" />
                    <rect x={redirect.x - 4} y={redirect.y - 4} width="8" height="20" fill="#78350f" />
                    <circle cx={redirect.x} cy={redirect.y} r="6" fill="#451a03" />
                  </g>
                )}
                {pulleyType === 'carabiner' && (
                  <g>
                    <path d={`M ${redirect.x - 12} ${redirect.y - 14}
                              C ${redirect.x - 18} ${redirect.y - 14}, ${redirect.x - 18} ${redirect.y + 10}, ${redirect.x - 12} ${redirect.y + 14}
                              L ${redirect.x + 12} ${redirect.y + 14}
                              C ${redirect.x + 18} ${redirect.y + 14}, ${redirect.x + 18} ${redirect.y - 14}, ${redirect.x + 12} ${redirect.y - 14} Z`}
                      fill="none" stroke="#0ea5e9" strokeWidth="3.5" />
                    <line x1={redirect.x - 8} y1={redirect.y - 14} x2={redirect.x + 8} y2={redirect.y - 14}
                      stroke="#0ea5e9" strokeWidth="2" />
                  </g>
                )}
                {pulleyType === 'pulley' && (
                  <g>
                    <circle cx={redirect.x} cy={redirect.y} r="14" fill="#cbd5e1" stroke="#475569" strokeWidth="3" />
                    <circle cx={redirect.x} cy={redirect.y} r="8" fill="#94a3b8" stroke="#334155" strokeWidth="1" />
                    <circle cx={redirect.x} cy={redirect.y} r="2.5" fill="#0f172a" />
                    <line x1={redirect.x - 14} y1={redirect.y} x2={redirect.x + 14} y2={redirect.y} stroke="#475569" strokeWidth="0.8" />
                  </g>
                )}
                <text x={redirect.x} y={redirect.y + 42} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#22c55e">
                  R 轉折點
                </text>
              </g>

              {/* 操作端 O（橙色） */}
              <g onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setDrag('O'); }}
                className="cursor-grab active:cursor-grabbing">
                <circle cx={operator.x} cy={operator.y} r="22" fill="transparent" />
                <circle cx={operator.x} cy={operator.y} r="14" fill="#fb923c" stroke="#7c2d12" strokeWidth="2" />
                <text x={operator.x} y={operator.y + 5} textAnchor="middle" fontSize="12" fontWeight="bold" fill="#fff">O</text>
                <text x={operator.x} y={operator.y + 32} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#fb923c">
                  操作端
                </text>
              </g>

              {/* 圖例 */}
              <g transform="translate(10, 10)">
                <rect x="0" y="0" width="220" height="76" rx="6"
                  fill={cameraOn ? 'rgba(15,23,42,0.7)' : 'rgba(2,6,23,0.85)'}
                  stroke="#475569" strokeWidth="1" />
                <text x="8" y="16" fontSize="11" fill="#cbd5e1" fontWeight="bold">圖例</text>
                <line x1="8" y1="28" x2="28" y2="28" stroke="#f59e0b" strokeWidth="3" />
                <text x="34" y="31" fontSize="10" fill="#cbd5e1">繩索</text>
                <line x1="100" y1="28" x2="120" y2="28" stroke="#ef4444" strokeWidth="3" />
                <text x="126" y="31" fontSize="10" fill="#cbd5e1">轉折點合力 R</text>
                <line x1="8" y1="42" x2="28" y2="42" stroke="#c084fc" strokeWidth="2" />
                <text x="34" y="45" fontSize="10" fill="#cbd5e1">包覆角 θ</text>
                <text x="100" y="45" fontSize="10" fill="#94a3b8">μ_eff = {fmt(muEff, 2)}</text>
                <text x="8" y="62" fontSize="9" fill="#94a3b8">A 載重 · R 轉折 · O 操作</text>
                <text x="8" y="74" fontSize="9" fill="#94a3b8">緊邊：{tight === 'A' ? '⬇ 垂降' : '⬆ 拉升'}</text>
              </g>
            </svg>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========================================================================
// 主應用
// ========================================================================
function App() {
  const [activeTab, setActiveTab] = useState(0);

  // PWA 安裝狀態
  const [installPrompt, setInstallPrompt] = useState(null);
  const [isInstalled, setIsInstalled] = useState(false);
  const [showIosHelp, setShowIosHelp] = useState(false);

  useEffect(() => {
    // 偵測是否已是 PWA 模式（安裝後）
    const standalone = window.matchMedia('(display-mode: standalone)').matches
                     || window.navigator.standalone === true;
    setIsInstalled(standalone);

    // 攔截 Android Chrome / Edge 的安裝事件
    const onPrompt = (e) => {
      e.preventDefault();
      setInstallPrompt(e);
    };
    const onInstalled = () => {
      setIsInstalled(true);
      setInstallPrompt(null);
    };
    window.addEventListener('beforeinstallprompt', onPrompt);
    window.addEventListener('appinstalled', onInstalled);
    return () => {
      window.removeEventListener('beforeinstallprompt', onPrompt);
      window.removeEventListener('appinstalled', onInstalled);
    };
  }, []);

  const isIOS = useMemo(() =>
    /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream, []);

  const handleInstall = async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const { outcome } = await installPrompt.userChoice;
      if (outcome === 'accepted') setInstallPrompt(null);
    } else {
      // iOS 或無原生支援的瀏覽器 → 顯示說明
      setShowIosHelp(true);
    }
  };

  const tabs = [
    { id: 0, name: '1. 繩索摩擦力',     icon: 'git',       comp: <FrictionModule /> },
    { id: 1, name: '2. 索道張力',       icon: 'move',      comp: <HighlineModule /> },
    { id: 2, name: '3. 墜落衝擊力',     icon: 'activity',  comp: <FallImpactModule /> },
    { id: 3, name: '4. 死亡三角',       icon: 'triangle',  comp: <DeathTriangleModule /> },
    { id: 4, name: '5. 變向固定點',     icon: 'arrowDown', comp: <DirectionalAnchorModule /> },
    { id: 5, name: '6. 拉力夾角模擬',   icon: 'anchor',    comp: <AnchorPullAngleModule /> },
    { id: 6, name: '7. 機械倍力 MA',    icon: 'cog',       comp: <MAModule /> },
    { id: 7, name: '8. 高轉折點分析',   icon: 'triangle',  comp: <RedirectAnalysisModule /> },
  ];

  return (
    <div className="min-h-screen bg-slate-950 text-slate-200 p-4 md:p-8 font-sans">
      <div className="max-w-6xl mx-auto space-y-6">
        <header className="border-b border-slate-800 pb-4 flex items-start justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-2xl md:text-3xl font-bold text-blue-400 flex items-center gap-3">
              <Icon name="activity" size={32} className="text-blue-500" />
              繩索受力分析系統 <span className="text-sm font-mono text-slate-500">v2</span>
            </h1>
            <p className="text-slate-400 mt-2 text-sm">
              依 <span className="text-slate-200 font-medium">NFPA 1983 / UIAA 101 / OSHA 1926.502</span> 設計 · 雙單位 (kN / kgf) · 安全係數驗算
            </p>
          </div>
          <div className="flex gap-2 flex-wrap no-print">
            {!isInstalled && (
              <button onClick={handleInstall}
                className="flex items-center gap-2 px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium shadow-lg shadow-blue-900/30">
                📱 加到主畫面
              </button>
            )}
            {isInstalled && (
              <span className="flex items-center gap-1 px-3 py-2 rounded-lg bg-emerald-900/40 border border-emerald-700/50 text-emerald-300 text-xs">
                ✓ 已安裝
              </span>
            )}
            <button onClick={() => window.print()}
              className="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm">
              <Icon name="print" size={16} /> 列印 / PDF
            </button>
          </div>
        </header>

        {/* iOS / 不支援自動安裝的瀏覽器：顯示手動安裝說明 */}
        {showIosHelp && (
          <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4 no-print"
            onClick={() => setShowIosHelp(false)}>
            <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md w-full space-y-4"
              onClick={(e) => e.stopPropagation()}>
              <div className="flex items-start justify-between gap-2">
                <h3 className="text-lg font-bold text-blue-400">📱 加到手機主畫面</h3>
                <button onClick={() => setShowIosHelp(false)}
                  className="text-slate-400 hover:text-slate-200 text-xl leading-none">×</button>
              </div>

              {isIOS ? (
                <div className="space-y-3 text-sm text-slate-300">
                  <p className="text-slate-400">在 iPhone / iPad 的 Safari 中：</p>
                  <ol className="list-decimal pl-5 space-y-2">
                    <li>點擊網址列下方的<strong className="text-blue-300">「分享」按鈕</strong>（方框向上箭頭 <span className="inline-block px-1.5 border border-blue-400 rounded text-blue-300">⬆</span>）</li>
                    <li>向下滑動找到<strong className="text-blue-300">「加入主畫面」</strong>（Add to Home Screen）</li>
                    <li>點擊右上角<strong className="text-blue-300">「新增」</strong>（Add）</li>
                  </ol>
                  <div className="text-xs text-amber-300 bg-amber-950/40 border border-amber-800/50 rounded p-2">
                    ⚠ 必須使用 Safari 瀏覽器（Chrome / Firefox 等其他 iOS 瀏覽器無法加到主畫面）
                  </div>
                </div>
              ) : (
                <div className="space-y-3 text-sm text-slate-300">
                  <p className="text-slate-400">在你的瀏覽器中：</p>
                  <ol className="list-decimal pl-5 space-y-2">
                    <li><strong>Android Chrome：</strong>點選右上角選單（⋮）→<strong className="text-blue-300">「加到主畫面」</strong>或「安裝應用程式」</li>
                    <li><strong>桌面 Chrome / Edge：</strong>網址列右側會出現安裝圖示（⊕），或選單→「安裝繩索分析」</li>
                    <li><strong>Firefox 行動版：</strong>選單→「安裝」</li>
                  </ol>
                  <div className="text-xs text-slate-500">
                    若沒有看到選項，請確認是透過 HTTPS（GitHub Pages 自動支援）連線。
                  </div>
                </div>
              )}

              <div className="bg-slate-950/60 border border-slate-700 rounded p-3 text-xs text-slate-400">
                安裝後可從主畫面直接開啟，享有<strong className="text-emerald-300">全螢幕</strong>、
                <strong className="text-emerald-300">離線使用</strong>、
                以及<strong className="text-emerald-300">原生 App 體驗</strong>。
              </div>

              <button onClick={() => setShowIosHelp(false)}
                className="w-full px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium">
                我知道了
              </button>
            </div>
          </div>
        )}

        <nav className="flex flex-wrap gap-2 no-print" role="tablist">
          {tabs.map((tab) => (
            <button key={tab.id}
              role="tab"
              aria-selected={activeTab === tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`flex items-center gap-2 px-3 py-2 rounded-lg font-medium text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400 ${
                activeTab === tab.id
                  ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20'
                  : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200'
              }`}>
              <Icon name={tab.icon} size={16} />
              {tab.name}
            </button>
          ))}
        </nav>

        <main className="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 overflow-hidden">
          {tabs[activeTab].comp}
        </main>

        <footer className="text-xs text-slate-500 text-center pt-4 border-t border-slate-800">
          <div className="flex items-center justify-center gap-2 mb-1">
            <Icon name="info" size={12} />
            僅供教學與參考。實際救援請以現場專業判斷為準，勿單獨依本工具進行重要決策。
          </div>
          <div>NFPA 1983-2017 · UIAA 101 · ANSI Z359 · OSHA 1926.502 · v2.0</div>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
